<script>
const SUPABASE_URL = "https://vpwbcuxwxkqvauffqooj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_1zZ68nxCL0XK0gPQDG5fsg_CqWCCBEU";
const TABLE = "accl_5s_audit_entries";

let entries = [];
let activeFilter = "all";
let activeSbuFilter = "all";
let showHidden = false;
const HIDDEN_KEY = "5s_audit_hidden_ids_v1";
let hiddenIds = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || "[]"));

function saveHiddenIds() {
  localStorage.setItem(HIDDEN_KEY, JSON.stringify(Array.from(hiddenIds)));
}
let highestAuditNum = 0;

function apiHeaders(extra) {
  return Object.assign({
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Content-Type": "application/json"
  }, extra || {});
}

// Map a Supabase row (snake_case columns) to the shape the UI uses internally.
function fromDbRow(row) {
  return {
    id: row.audit_no || ("AUD-" + row.id),
    dbId: row.id,
    timestamp: row.audit_timestamp ? new Date(row.audit_timestamp).toLocaleString("en-GB", {
      year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
    }).replace(",", "") : "",
    place: row.audit_place,
    sbu: row.sbu,
    auditor: row.auditor_name,
    enroll: row.auditor_enroll,
    s1: row.sort_removed, s2: row.sort_redtag,
    s3: row.order_location, s4: row.order_labels,
    s5: row.shine_clean, s6: row.shine_assigned,
    s7: row.standardize, s8: row.sustain,
    remarks: row.remarks
  };
}

async function loadEntries() {
  const statusEl = document.getElementById("statusMsg");
  if (statusEl) statusEl.textContent = "Loading...";
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=audit_timestamp.asc`,
      { headers: apiHeaders() }
    );
    if (!res.ok) throw new Error("Fetch failed: " + res.status);
    const rows = await res.json();
    entries = rows.map(fromDbRow);
    highestAuditNum = entries.reduce((max, e) => {
      const m = /AUD-(\d+)/.exec(e.id || "");
      return m ? Math.max(max, parseInt(m[1], 10)) : max;
    }, 0);
    if (statusEl) statusEl.textContent = "";
  } catch (err) {
    console.error(err);
    if (statusEl) statusEl.textContent = "Could not load from Supabase";
    entries = [];
  }
}

async function insertEntry(entry) {
  const payload = {
    audit_no: entry.id,
    sbu: entry.sbu,
    audit_place: entry.place,
    auditor_name: entry.auditor,
    auditor_enroll: entry.enroll,
    sort_removed: Number(entry.s1),
    sort_redtag: Number(entry.s2),
    order_location: Number(entry.s3),
    order_labels: Number(entry.s4),
    shine_clean: Number(entry.s5),
    shine_assigned: Number(entry.s6),
    standardize: Number(entry.s7),
    sustain: Number(entry.s8),
    remarks: entry.remarks || null
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: "POST",
    headers: apiHeaders({ "Prefer": "return=representation" }),
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error("Insert failed: " + res.status + " " + text);
  }
  return res.json();
}

async function deleteEntry(dbId) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${dbId}`, {
    method: "DELETE",
    headers: apiHeaders()
  });
  if (!res.ok) throw new Error("Delete failed: " + res.status);
}

function nextAuditNo() {
  return "AUD-" + String(highestAuditNum + 1).padStart(3, "0");
}

function nowTimestamp() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function pillarAvg(a, b) {
  const av = [a, b].map(Number).filter(v => !isNaN(v) && v !== "");
  if (av.length === 0) return null;
  return av.reduce((x,y)=>x+y,0) / av.length;
}

function computeTotals(e) {
  const sort = pillarAvg(e.s1, e.s2);
  const order = pillarAvg(e.s3, e.s4);
  const shine = pillarAvg(e.s5, e.s6);
  const standardize = e.s7 !== "" && e.s7 !== undefined && e.s7 !== null ? Number(e.s7) : null;
  const sustain = e.s8 !== "" && e.s8 !== undefined && e.s8 !== null ? Number(e.s8) : null;
  const pillars = [sort, order, shine, standardize, sustain];
  if (pillars.some(p => p === null)) return { total: null, percent: null };
  const total = Math.round((sort + order + shine + standardize + sustain) * 100) / 100;
  const percent = Math.round((total / 25) * 10000) / 100; // 2 decimal places
  return { total, percent };
}

function computeFinal(e) {
  return computeTotals(e).percent;
}

function scoreBand(final) {
  if (final === null) return "bad";
  if (final >= 80) return "good";
  if (final >= 60) return "avg";
  return "bad";
}

function scoreLabel(band) {
  if (band === "good") return "Good Standing";
  if (band === "avg") return "Needs Attention";
  return "Critical";
}

function escapeHtml(str) {
  if (str === undefined || str === null) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function refreshFormDefaults() {
  document.getElementById("auditNo").value = nextAuditNo();
  document.getElementById("timestampDisplay").value = nowTimestamp();
}

function renderCards() {
  const list = document.getElementById("cardsList");
  const filtered = entries.filter(e => {
    if (showHidden) return hiddenIds.has(e.id);
    if (hiddenIds.has(e.id)) return false;
    if (activeSbuFilter !== "all" && (e.sbu || "") !== activeSbuFilter) return false;
    if (activeFilter === "all") return true;
    return scoreBand(computeFinal(e)) === activeFilter;
  });

  const hiddenToggle = document.getElementById("hiddenToggle");
  if (hiddenToggle) {
    hiddenToggle.textContent = showHidden
      ? "Back to dashboard"
      : `Show hidden (${hiddenIds.size})`;
  }

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">No entries in this view yet.</div>`;
    return;
  }

  list.innerHTML = filtered.slice().reverse().map(e => {
    const { total, percent } = computeTotals(e);
    const band = scoreBand(percent);
    const criteriaLabels = [
      ["Sort - Removed", e.s1], ["Sort - Red tag", e.s2],
      ["Order - Location", e.s3], ["Order - Labels", e.s4],
      ["Shine - Clean", e.s5], ["Shine - Assigned", e.s6],
      ["Standardize", e.s7], ["Sustain", e.s8]
    ];
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-id-group">
            <span class="card-id">${escapeHtml(e.id)}</span>
            <span class="status-chip status-${band}">${scoreLabel(band)}</span>
          </div>
          <span class="card-meta">Logged ${escapeHtml(e.timestamp)}</span>
        </div>
        <div class="tag-row">
          <span class="tag">${escapeHtml(e.sbu || "—")}</span>
          <span class="tag">${escapeHtml(e.place || "—")}</span>
          <span class="tag">By ${escapeHtml(e.auditor || "—")}</span>
          <span class="tag">Enroll ${escapeHtml(e.enroll || "—")}</span>
        </div>
        <div class="section-label">Criteria Breakdown</div>
        <div class="criteria-grid">
          ${criteriaLabels.map(([k,v]) => `
            <div class="criteria-item">
              <span class="k">${k}</span>
              <span class="v">${v === undefined || v === "" || v === null ? "—" : v}</span>
            </div>`).join("")}
        </div>
        ${e.remarks ? `<div class="section-label">Remarks</div><div class="remarks-text">${escapeHtml(e.remarks)}</div>` : ""}
        <div class="card-footer">
          <span class="final-score-pill status-${band}">Final Score: ${percent === null ? "—" : percent + "%"} ${total === null ? "" : `(${total}/25)`}</span>
          <span>
            <button class="hide-link" data-id="${escapeHtml(e.id)}">${hiddenIds.has(e.id) ? "Unhide" : "Hide"}</button>
            <button class="del-link" data-id="${escapeHtml(e.id)}">Delete</button>
          </span>
        </div>
      </div>
    `;
  }).join("");

  list.querySelectorAll(".hide-link").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      if (hiddenIds.has(id)) {
        hiddenIds.delete(id);
      } else {
        hiddenIds.add(id);
      }
      saveHiddenIds();
      renderCards();
    });
  });

  list.querySelectorAll(".del-link").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.getAttribute("data-id");
      const target = entries.find(e => e.id === id);
      btn.disabled = true;
      btn.textContent = "Deleting...";
      try {
        if (target && target.dbId !== undefined) {
          await deleteEntry(target.dbId);
        }
        entries = entries.filter(e => e.id !== id);
        hiddenIds.delete(id);
        saveHiddenIds();
        renderCards();
      } catch (err) {
        console.error(err);
        alert("Could not delete this entry. Please try again.");
        btn.disabled = false;
        btn.textContent = "Delete";
      }
    });
  });
}

document.querySelectorAll(".filter-pill[data-filter]").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    activeFilter = pill.getAttribute("data-filter");
    renderCards();
  });
});

document.getElementById("sbuFilter").addEventListener("change", (e) => {
  activeSbuFilter = e.target.value;
  renderCards();
});

document.getElementById("hiddenToggle").addEventListener("click", () => {
  showHidden = !showHidden;
  renderCards();
});

document.getElementById("submitBtn").addEventListener("click", async () => {
  const sbu = document.getElementById("sbuSelect").value;
  const place = document.getElementById("auditPlace").value.trim();
  const auditor = document.getElementById("auditorName").value.trim();
  const enroll = document.getElementById("auditorEnroll").value.trim();
  const scores = ["s1","s2","s3","s4","s5","s6","s7","s8"].map(id => document.getElementById(id).value);
  const remarks = document.getElementById("remarks").value.trim();

  if (!sbu || !place || !auditor || !enroll || scores.some(v => v === "")) {
    alert("Please fill all required fields (marked *) before logging the entry.");
    return;
  }

  const entry = {
    id: nextAuditNo(),
    sbu, place, auditor, enroll,
    s1: scores[0], s2: scores[1], s3: scores[2], s4: scores[3],
    s5: scores[4], s6: scores[5], s7: scores[6], s8: scores[7],
    remarks
  };

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Logging...";

  try {
    const inserted = await insertEntry(entry);
    const row = Array.isArray(inserted) ? inserted[0] : inserted;
    entries.push(fromDbRow(row));
    highestAuditNum += 1;

    // reset form
    document.getElementById("sbuSelect").value = "";
    document.getElementById("auditPlace").value = "";
    document.getElementById("auditorName").value = "";
    document.getElementById("auditorEnroll").value = "";
    ["s1","s2","s3","s4","s5","s6","s7","s8"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("remarks").value = "";
    refreshFormDefaults();
    renderCards();
  } catch (err) {
    console.error(err);
    alert("Could not save this entry to Supabase. Please check your connection and try again.");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Log Entry";
  }
});

(async function init() {
  await loadEntries();
  refreshFormDefaults();
  renderCards();
})();

/* ============================================================

  { key:'productivity',  chipLabel:'Productivity Improvement Savings',  amountLabel:'Monthly Productivity Amount',      unitMode:'text',   unitDefault:'MT',  prefix:'' },
  { key:'waste',         chipLabel:'Waste Savings',                     amountLabel:'Monthly Waste Savings Amount',     unitMode:'select', unitOptions:['Pcs','MT'], prefix:'' },
  { key:'environment',   chipLabel:'Environment Impact Savings',        amountLabel:'Monthly Environment Impact',       unitMode:'select', unitOptions:['Water (Ltr)','Electricity (kW)'], prefix:'' },
  { key:'time',          chipLabel:'Time Savings',                      amountLabel:'Monthly Time Saving Amount',       unitMode:'text',   unitDefault:'min', prefix:'' }
];

/* ============================================================
   SUPABASE CONFIG — Cost Savings / Productivity / Environment /
   Wastage(QTY) / Time(Min) each live in their own table.
   ============================================================ */
const SUPABASE_URL = 'https://vpwbcuxwxkqvauffqooj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwd2JjdXh3eGtxdmF1ZmZxb29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MjA4NjEsImV4cCI6MjA5OTM5Njg2MX0.iAoIZXl-2G7h3wm4jcYsEs6-wdN-YKTS-KbBteBBzUk';

const TABLE_MAP = {
  cost: 'accl_cost_savings',
  productivity: 'accl_productivity_improvement',
  waste: 'accl_wastage_savings_qty',
  environment: 'accl_environment_impact',
  time: 'accl_time_savings_min'
};

async function sbFetch(path, options = {}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers || {})
    }
  });
  if(!res.ok){
    const text = await res.text().catch(()=> '');
    throw new Error(`Supabase ${path} failed: ${res.status} ${text}`);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : null;
}

function monthKeyFromDate(dateStr){
  const d = dateStr ? new Date(dateStr) : new Date();
  if(isNaN(d.getTime())) return new Date().toISOString().slice(0,7);
  return d.toISOString().slice(0,7); // "YYYY-MM"
}

/* ============================================================
   SHARED STATE
   ============================================================ */
let icCards = [];
let currentIcTab = 'all';
const IC_KEY = 'improvement-cards-v2';

let pcCards = [];
let currentPcTab = 'all';

const LEDGER_KEY = 'opex-savings-entries-unified';

function todayISO(){ return new Date().toISOString().slice(0,10); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
}
function fmtMoney(n){
  return new Intl.NumberFormat('en-US',{minimumFractionDigits:2, maximumFractionDigits:2}).format(n);
}

/* ============================================================
   AUTO CARD NUMBERING
   ============================================================ */
function nextCardNo(pool, prefix){
  let max = 0;
  // No trailing $ anchor — card numbers now look like "ICO-05 — VRM", so we
  // only need to match the "PREFIX-NN" lead-in to find the next sequence number.
  const re = new RegExp('^'+prefix+'-(\\d+)','i');
  pool.forEach(c => { const m = re.exec(c.cardno); if(m) max = Math.max(max, parseInt(m[1],10)); });
  return prefix + '-' + String(max+1).padStart(2,'0');
}
function refreshIcCardNoPreview(){
  const dept = document.getElementById('ic-dept').value;
  const field = document.getElementById('ic-cardno');
  field.value = dept ? nextCardNo(icCards, 'ICO') + ' — ' + dept : 'Select a department first';
}
function refreshPcCardNoPreview(){
  const dept = document.getElementById('ps-dept').value;
  const field = document.getElementById('ps-cardno');
  field.value = dept ? nextCardNo(pcCards, 'PSC') + ' — ' + dept : 'Select a department first';
}

/* ============================================================
   IMPROVEMENT CARDS
   ============================================================ */
const IC_TABLE = 'accl_improvement_cards';

function icRowToCard(row){
  const raw = row.status || 'Pending';
  let status;
  if(raw === 'Pending') status = 'pending';        // only truly-new, undecided cards
  else if(raw === 'Ongoing') status = 'ongoing';
  else if(raw === 'Rejected') status = 'rejected';
  else status = 'locked';                          // Completed / Initiated / any other historical status — read-only
  return {
    id: row.id, sbu: row.sbu, cardno: row.card_no, dept: row.dept,
    provider: row.provider, created: row.created_date, details: row.details,
    benefit: row.benefit,
    status, rawStatus: raw,
    targetDate: row.target_date, acceptedDate: row.accepted_date, hidden: !!row.hidden
  };
}

async function loadIcCards(){
  try{
    const rows = await sbFetch(`${IC_TABLE}?select=*&order=id.desc`);
    icCards = (rows||[]).map(icRowToCard);
  }catch(e){ console.error('loadIcCards failed', e); icCards = []; }
  refreshIcCardNoPreview();
  renderIc();
}

async function logCard(){
  const sbu = document.getElementById('ic-sbu').value;
  const dept = document.getElementById('ic-dept').value;
  const provider = document.getElementById('ic-provider').value.trim();
  const created = document.getElementById('ic-created').value;
  const details = document.getElementById('ic-details').value.trim();
  const benefit = document.getElementById('ic-benefit').value.trim();
  const err = document.getElementById('ic-errBanner');

  if(!sbu || !dept || !provider || !created || !details){
    err.style.display='block'; return;
  }
  err.style.display='none';

  const cardno = nextCardNo(icCards, 'ICO') + ' — ' + dept;
  try{
    await sbFetch(IC_TABLE, { method: 'POST', body: JSON.stringify({
      sbu, card_no: cardno, dept, provider, created_date: created,
      details, benefit, status: 'Pending'
    })});
  }catch(e){
    console.error('logCard failed', e);
    showToast('Failed to save — check connection');
    return;
  }
  await loadIcCards();
  clearIcForm();
  showToast(`Card ${cardno} logged — awaiting decision`);
  refreshIcCardNoPreview();
  renderIc();
}

function clearIcForm(){
  document.getElementById('ic-sbu').value='';
  document.getElementById('ic-dept').value='';
  document.getElementById('ic-provider').value='';
  document.getElementById('ic-created').value='';
  document.getElementById('ic-details').value='';
  document.getElementById('ic-benefit').value='';
}

function setIcTab(t){
  currentIcTab = t;
  document.querySelectorAll('#view-ic .chip').forEach(el=>el.classList.toggle('active', el.dataset.f===t));
  renderIc();
}

function showTargetPicker(id){ icCards.find(c=>c.id===id)._picking = true; renderIc(); }
function cancelPick(id){ delete icCards.find(c=>c.id===id)._picking; renderIc(); }

async function confirmAccept(id){
  const input = document.getElementById('target-'+id);
  const val = input.value;
  if(!val){ input.focus(); return; }
  const accepted = todayISO();
  try{
    await sbFetch(`${IC_TABLE}?id=eq.${id}`, {
      method: 'PATCH', prefer: 'return=minimal',
      body: JSON.stringify({ status: 'Ongoing', target_date: val, accepted_date: accepted })
    });
  }catch(e){
    console.error('confirmAccept failed', e);
    showToast('Failed to update — check connection');
    return;
  }
  await loadIcCards();
  showToast('Marked as ongoing — now available in the Savings Form');
  renderIc();
}

async function rejectCard(id){
  try{
    await sbFetch(`${IC_TABLE}?id=eq.${id}`, {
      method: 'PATCH', prefer: 'return=minimal',
      body: JSON.stringify({ status: 'Rejected' })
    });
  }catch(e){
    console.error('rejectCard failed', e);
    showToast('Failed to reject — check connection');
    return;
  }
  await loadIcCards();
  showToast('Card marked as rejected');
  refreshIcCardNoPreview();
  renderIc();
}
async function deleteIcCard(id){
  try{
    await sbFetch(`${IC_TABLE}?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  }catch(e){
    console.error('deleteIcCard failed', e);
    showToast('Failed to delete — check connection');
    return;
  }
  icCards = icCards.filter(c=>c.id!==id);
  showToast('Card deleted');
  refreshIcCardNoPreview();
  renderIc();
}
async function hideIcCard(id){
  try{
    await sbFetch(`${IC_TABLE}?id=eq.${id}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ hidden: true }) });
  }catch(e){ console.error('hideIcCard failed', e); }
  const c = icCards.find(c=>c.id===id); if(c) c.hidden = true;
  renderIc();
}
async function unhideIcCard(id){
  try{
    await sbFetch(`${IC_TABLE}?id=eq.${id}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ hidden: false }) });
  }catch(e){ console.error('unhideIcCard failed', e); }
  const c = icCards.find(c=>c.id===id); if(c) c.hidden = false;
  renderIc();
}

function renderIc(){
  const list = document.getElementById('icList');
  let filtered;
  if(currentIcTab === 'hidden') filtered = icCards.filter(c=>c.hidden);
  else if(currentIcTab === 'all') filtered = icCards.filter(c=>!c.hidden);
  else filtered = icCards.filter(c=>!c.hidden && c.status===currentIcTab);

  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><p>${icCards.length===0 ? 'No improvement cards logged yet — use the form.' : 'Nothing in this view.'}</p></div>`;
    return;
  }

/* ============================================================
   PROBLEM SOLVING CARDS
   ============================================================ */
const PC_TABLE = 'accl_problem_solving_cards';

function pcRowToCard(row){
  const raw = row.status || 'Pending';
  let status;
  if(raw === 'Pending') status = 'pending';
  else if(raw === 'Ongoing') status = 'ongoing';
  else if(raw === 'Rejected') status = 'rejected';
  else status = 'locked';
  return {
    id: row.id, sbu: row.sbu, cardno: row.card_no, dept: row.dept,
    provider: row.provider, created: row.created_date,
    problem: row.problem_description, rootCause: row.root_cause, corrective: row.corrective_action,
    status, rawStatus: raw,
    targetDate: row.target_date, acceptedDate: row.accepted_date, hidden: !!row.hidden
  };
}

async function loadPcCards(){
  try{
    const rows = await sbFetch(`${PC_TABLE}?select=*&order=id.desc`);
    pcCards = (rows||[]).map(pcRowToCard);
  }catch(e){ console.error('loadPcCards failed', e); pcCards = []; }
  refreshPcCardNoPreview();
  renderPc();
}

async function logPcCard(){
  const sbu = document.getElementById('ps-sbu').value;
  const dept = document.getElementById('ps-dept').value;
  const provider = document.getElementById('ps-provider').value.trim();
  const created = document.getElementById('ps-created').value;
  const details = document.getElementById('ps-details').value.trim();
  const rootCause = document.getElementById('ps-rootcause').value.trim();
  const corrective = document.getElementById('ps-corrective').value.trim();
  const err = document.getElementById('ps-errBanner');

  if(!sbu || !dept || !provider || !created || !details){
    err.style.display='block'; return;
  }
  err.style.display='none';

  const cardno = nextCardNo(pcCards, 'PSC') + ' — ' + dept;
  try{
    await sbFetch(PC_TABLE, { method: 'POST', body: JSON.stringify({
      sbu, card_no: cardno, dept, provider, created_date: created,
      problem_description: details, root_cause: rootCause || null, corrective_action: corrective || null,
      status: 'Pending'
    })});
  }catch(e){
    console.error('logPcCard failed', e);
    showToast('Failed to save — check connection');
    return;
  }
  await loadPcCards();
  clearPcForm();
  showToast(`Card ${cardno} logged — awaiting decision`);
  refreshPcCardNoPreview();
  renderPc();
}

function clearPcForm(){
  document.getElementById('ps-sbu').value='';
  document.getElementById('ps-dept').value='';
  document.getElementById('ps-provider').value='';
  document.getElementById('ps-created').value='';
  document.getElementById('ps-details').value='';
  document.getElementById('ps-rootcause').value='';
  document.getElementById('ps-corrective').value='';
}

function setPcTab(t){
  currentPcTab = t;
  document.querySelectorAll('#view-pc .chip').forEach(el=>el.classList.toggle('active', el.dataset.f===t));
  renderPc();
}

function showTargetPickerPc(id){ pcCards.find(c=>c.id===id)._picking = true; renderPc(); }
function cancelPickPc(id){ delete pcCards.find(c=>c.id===id)._picking; renderPc(); }

async function confirmAcceptPc(id){
  const input = document.getElementById('target-pc-'+id);
  const val = input.value;
  if(!val){ input.focus(); return; }
  const accepted = todayISO();
  try{
    await sbFetch(`${PC_TABLE}?id=eq.${id}`, {
      method: 'PATCH', prefer: 'return=minimal',
      body: JSON.stringify({ status: 'Ongoing', target_date: val, accepted_date: accepted })
    });
  }catch(e){
    console.error('confirmAcceptPc failed', e);
    showToast('Failed to update — check connection');
    return;
  }
  await loadPcCards();
  showToast('Marked as ongoing — now available in the Savings Form');
  renderPc();
}

async function rejectPcCard(id){
  try{
    await sbFetch(`${PC_TABLE}?id=eq.${id}`, {
      method: 'PATCH', prefer: 'return=minimal',
      body: JSON.stringify({ status: 'Rejected' })
    });
  }catch(e){
    console.error('rejectPcCard failed', e);
    showToast('Failed to reject — check connection');
    return;
  }
  await loadPcCards();
  showToast('Card marked as rejected');
  refreshPcCardNoPreview();
  renderPc();
}
async function deletePcCard(id){
  try{
    await sbFetch(`${PC_TABLE}?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  }catch(e){
    console.error('deletePcCard failed', e);
    showToast('Failed to delete — check connection');
    return;
  }
  pcCards = pcCards.filter(c=>c.id!==id);
  showToast('Card deleted');
  refreshPcCardNoPreview();
  renderPc();
}
async function hidePcCard(id){
  try{
    await sbFetch(`${PC_TABLE}?id=eq.${id}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ hidden: true }) });
  }catch(e){ console.error('hidePcCard failed', e); }
  const c = pcCards.find(c=>c.id===id); if(c) c.hidden = true;
  renderPc();
}
async function unhidePcCard(id){
  try{
    await sbFetch(`${PC_TABLE}?id=eq.${id}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ hidden: false }) });
  }catch(e){ console.error('unhidePcCard failed', e); }
  const c = pcCards.find(c=>c.id===id); if(c) c.hidden = false;
  renderPc();
}

  const list = document.getElementById('pcList');

  else if(currentPcTab === 'all') filtered = pcCards.filter(c=>!c.hidden);
  else filtered = pcCards.filter(c=>!c.hidden && c.status===currentPcTab);

  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><p>${pcCards.length===0 ? 'No problem solving cards logged yet — use the form.' : 'Nothing in this view.'}</p></div>`;

    <div class="ic-card">
      <div class="ic-top">
        <div class="ic-title-group">
          <span class="ic-cardno">${escapeHtml(c.cardno)}</span>
          <span class="badge ${c.status}">${c.status==='ongoing' ? 'Ongoing' : c.status==='rejected' ? 'Rejected' : c.status==='locked' ? escapeHtml(c.rawStatus) : 'Pending'}</span>
        </div>
        <div class="ic-meta"><span>${escapeHtml(c.sbu)}</span><span>Logged ${c.created}</span></div>
      </div>
      <div class="ic-tags">
        <span class="tag">${escapeHtml(c.dept)}</span>
        <span class="tag">By ${escapeHtml(c.provider)}</span>
      </div>
      <div class="ic-body"><span class="label">Problem Description</span>${escapeHtml(c.problem)}</div>
      ${c.rootCause ? `<div class="ic-body"><span class="label">Root Cause</span>${escapeHtml(c.rootCause)}</div>` : ''}
      ${c.corrective ? `<div class="ic-body"><span class="label">Corrective / Remedial Action</span>${escapeHtml(c.corrective)}</div>` : ''}

      ${c.status === 'ongoing' ? `
        <div class="ongoing-row"><span class="pulse"></span>Project ongoing — target completion <span class="target-date">${c.targetDate}</span></div>
      ` : c.status === 'rejected' || c.status === 'locked' ? '' : c._picking ? `
        <div class="decision-row">
          <div class="target-inline">
            <input type="date" id="target-pc-${c.id}" />
            <button class="btn small green" onclick="confirmAcceptPc(${c.id})">Confirm target</button>
          </div>
          <button class="btn small ghost" onclick="cancelPickPc(${c.id})">Cancel</button>
        </div>
      ` : `
        <div class="decision-row">
          <button class="btn small green" onclick="showTargetPickerPc(${c.id})">Accept</button>
          <button class="btn small ghost-danger" onclick="rejectPcCard(${c.id})">Reject</button>
        </div>
      `}

      <div class="card-footer">
        ${c.hidden
          ? `<button class="btn small ghost" onclick="unhidePcCard(${c.id})">Unhide</button>`
          : `<button class="btn small ghost" onclick="hidePcCard(${c.id})">Hide</button>`
        }
        <button class="btn small ghost-danger" onclick="deletePcCard(${c.id})">Delete</button>

   SAVINGS FORM (merged) — one entry form, 5 amount sections

function buildCatFieldsHTML(){
  return CATEGORIES.map(cat => {
    const amountInput = `<input id="sv-amount-${cat.key}" type="number" placeholder="0.00" step="0.01" />`;
    const amountWrapped = cat.prefix
      ? `<div class="save-input-wrap"><span class="save-prefix">${cat.prefix}</span>${amountInput}</div>`
      : amountInput;
    const unitField = cat.unitMode === 'select'
      ? `<select id="sv-uom-${cat.key}">${cat.unitOptions.map(o=>`<option>${escapeHtml(o)}</option>`).join('')}</select>`
      : `<input id="sv-uom-${cat.key}" placeholder="Unit" value="${escapeHtml(cat.unitDefault)}" />`;
    return `
      <div class="section-divider">${escapeHtml(cat.chipLabel)}</div>
      <label>${escapeHtml(cat.amountLabel)}</label>
      <div class="row2">${amountWrapped}${unitField}</div>
    `;
  }).join('');
}

function buildCategoryChips(){
  const row = document.getElementById('sv-categoryChipRow');
  const all = `<button class="chip active" data-f="all" onclick="setCategoryFilter('all')">All categories</button>`;
  const rest = CATEGORIES.map(cat =>
    `<button class="chip" data-f="${cat.key}" onclick="setCategoryFilter('${cat.key}')">${escapeHtml(cat.chipLabel)}</button>`
  ).join('');
  row.innerHTML = all + rest;
}

function buildCatStats(){
  const row = document.getElementById('sv-catStats');
  row.innerHTML = CATEGORIES.map(cat => {
    const catEntries = ledgerState.entries.filter(e => e.category === cat.key);
    const total = catEntries.reduce((s,e)=>s+e.amount, 0);
    const uoms = new Set(catEntries.map(e=>e.uom).filter(Boolean));
    const unitLabel = uoms.size === 0 ? (cat.unitDefault || '') : (uoms.size === 1 ? [...uoms][0] : 'mixed units');
    const prefix = cat.prefix || '';
    return `
      <div class="cat-stat-card">
        <div class="n">${prefix}${fmtMoney(total)}</div>
        <div class="l">${escapeHtml(cat.chipLabel)} ${unitLabel ? '· '+escapeHtml(unitLabel) : ''}</div>
      </div>`;
  }).join('');
}

function rowToEntry(row, categoryKey){
  const monthly = row.monthly_values || {};
  const amount = Object.values(monthly).reduce((s,v)=>s + (parseFloat(v)||0), 0);
  return {
    sl: row.sl ?? row.id,
    dbId: row.id,
    category: categoryKey,
    source: row.source,
    cardno: row.card_no,
    section: row.section,
    benefit: row.project_details,
    created: row.start_date,
    complete: row.completed_date,
    ongoing: '',
    amount,
    uom: row.uom,
    logged: row.created_at
  };
}

async function loadEntries(){
  try{
    const results = await Promise.all(
      Object.entries(TABLE_MAP).map(([catKey, table]) =>
        sbFetch(`${table}?select=*&hidden=eq.false&order=id.desc`).then(rows => (rows||[]).map(r => rowToEntry(r, catKey)))
      )
    );
    ledgerState.entries = results.flat().sort((a,b) => new Date(b.logged||0) - new Date(a.logged||0));
    ledgerState.nextSL = ledgerState.entries.reduce((m,e)=>Math.max(m,e.sl||0),0)+1;
  }catch(e){
    console.error('loadEntries failed', e);
    ledgerState.entries = [];
  }
}

function poolForSource(source){ return source === 'IC' ? icCards : pcCards; }

function onSourceChange(key){
  refreshCardNoOptions(key);
  onCardNoSelect(key);
}

function refreshCardNoOptions(key){
  const source = document.getElementById(key+'-source').value;
  const sel = document.getElementById(key+'-cardno-select');
  const pool = poolForSource(source);
  const ongoing = pool.filter(c => c.status === 'ongoing');
  const label = source === 'IC' ? 'improvement' : 'problem solving';
  if(ongoing.length === 0){
    sel.innerHTML = `<option value="">No ongoing ${label} cards yet</option>`;
    return;
  }
  sel.innerHTML = ongoing.map(c =>
    `<option value="${c.id}">${escapeHtml(c.cardno)} — ${escapeHtml(c.dept)}</option>`
  ).join('');
}

function onCardNoSelect(key){
  const source = document.getElementById(key+'-source').value;
  const pool = poolForSource(source);
  const sel = document.getElementById(key+'-cardno-select');
  const id = parseInt(sel.value);
  const c = pool.find(c => c.id === id);
  const secEl = document.getElementById(key+'-section');
  const benEl = document.getElementById(key+'-benefit');
  const creEl = document.getElementById(key+'-created');
  const ongEl = document.getElementById(key+'-ongoing');

  if(!c){
    secEl.value = '';
    secEl.placeholder = 'Select a card above';
    secEl.disabled = false; benEl.disabled = false; creEl.disabled = false; ongEl.disabled = false;
    return;
  }
  // Department comes straight from Supabase (the card's own dept field) — always
  // reflects the real value, whatever it is, instead of only matching a fixed list.
  secEl.value = c.dept || '';
  benEl.value = c.benefit || '';
  creEl.value = c.created;
  ongEl.value = c.acceptedDate || '';
  secEl.disabled = true; benEl.disabled = true; creEl.disabled = true; ongEl.disabled = true;
}

function clearLedgerForm(){
  document.getElementById('sv-benefit').value='';
  document.getElementById('sv-created').value='';
  document.getElementById('sv-ongoing').value='';
  document.getElementById('sv-complete').value='';
  CATEGORIES.forEach(cat=>{
    document.getElementById('sv-amount-'+cat.key).value='';
    if(cat.unitMode === 'text') document.getElementById('sv-uom-'+cat.key).value = cat.unitDefault;
  });
  document.getElementById('sv-source').value='IC';
  document.getElementById('sv-section').value='';
  document.getElementById('sv-section').placeholder='Select a card above';
  document.getElementById('sv-section').disabled=false;
  document.getElementById('sv-benefit').disabled=false;
  document.getElementById('sv-created').disabled=false;
  document.getElementById('sv-ongoing').disabled=false;
  document.getElementById('sv-err').style.display='none';
  onSourceChange('sv');
}

async function addEntry(){
  const source = document.getElementById('sv-source').value;
  const sel = document.getElementById('sv-cardno-select');
  const opt = sel.options[sel.selectedIndex];
  const cardno = opt ? opt.textContent.split(' — ')[0] : '';
  const err = document.getElementById('sv-err');

  if(!cardno){ err.style.display='block'; return; }

  const section = document.getElementById('sv-section').value;
  const benefit = document.getElementById('sv-benefit').value.trim();
  const created = document.getElementById('sv-created').value || null;
  const complete = document.getElementById('sv-complete').value || null;
  const monthKey = monthKeyFromDate(created);

  const inserts = [];
  CATEGORIES.forEach(cat=>{
    const raw = document.getElementById('sv-amount-'+cat.key).value;
    if(raw === '' || raw === null) return;
    const amount = parseFloat(raw);
    if(isNaN(amount)) return;
    const uom = document.getElementById('sv-uom-'+cat.key).value.trim();
    inserts.push({
      table: TABLE_MAP[cat.key],
      body: {
        sl: ledgerState.nextSL++,
        source, card_no: cardno,
        project_details: benefit,
        section,
        uom,
        start_date: created,
        completed_date: complete,
        monthly_values: { [monthKey]: amount }
      }
    });
  });

  if(inserts.length === 0){ err.style.display='block'; return; }
  err.style.display='none';

  try{
    await Promise.all(inserts.map(({table, body}) =>
      sbFetch(table, { method: 'POST', body: JSON.stringify(body) })
    ));
  }catch(e){
    console.error('addEntry failed', e);
    showToast('Failed to save — check connection');
    return;
  }

  await loadEntries();
  clearLedgerForm();
  showToast(inserts.length === 1 ? '1 entry added to ledger' : `${inserts.length} entries added to ledger`);
  render();
}

async function deleteEntry(sl){
  const entry = ledgerState.entries.find(e => e.sl === sl);
  if(!entry) return;
  const table = TABLE_MAP[entry.category];
  try{
    await sbFetch(`${table}?id=eq.${entry.dbId}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ hidden: true }) });
  }catch(e){
    console.error('deleteEntry failed', e);
    showToast('Failed to remove — check connection');
    return;
  }
  ledgerState.entries = ledgerState.entries.filter(e => e.sl !== sl);
  showToast('Entry removed from dashboard');
  render();
}

function setSourceFilter(f){
  ledgerState.sourceFilter = f;
  document.querySelectorAll('#sv-sourceChipRow .chip').forEach(c=>c.classList.toggle('active', c.dataset.f===f));
  render();
}
function setCategoryFilter(f){

  document.querySelectorAll('#sv-categoryChipRow .chip').forEach(c=>c.classList.toggle('active', c.dataset.f===f));

}

function toggleDropdown(which){
  const panel = document.getElementById('sv-'+which+'Panel');
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('open'));

    document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('open'));
  }

function buildMonthPanel(){
  const panel = document.getElementById('sv-monthPanel');
  const items = [`<div class="dd-item ${ledgerState.month==='all'?'active':''}" onclick="setMonthFilter('all')">All months</div>`]
    .concat(MONTHS.map((m,i)=>`<div class="dd-item ${ledgerState.month===i?'active':''}" onclick="setMonthFilter(${i})">${m}</div>`));

}
function setMonthFilter(v){
  ledgerState.month = v;
  const btn = document.getElementById('sv-monthBtn');
  btn.textContent = (v==='all' ? 'Month: All ▾' : MONTHS[v]+' ▾');

  document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('open'));

}

function entryDateForFilter(e){ return e.created || (e.logged ? e.logged.slice(0,10) : null); }

function buildYearPanel(){
  const years = new Set();
  ledgerState.entries.forEach(e=>{ const d = entryDateForFilter(e); if(d) years.add(parseInt(d.slice(0,4))); });
  const sorted = [...years].sort((a,b)=>b-a);
  const list = sorted.length ? sorted : [new Date().getFullYear()];
  const panel = document.getElementById('sv-yearPanel');
  const items = [`<div class="dd-item ${ledgerState.year==='all'?'active':''}" onclick="setYearFilter('all')">All years</div>`]
    .concat(list.map(y=>`<div class="dd-item ${ledgerState.year===y?'active':''}" onclick="setYearFilter(${y})">${y}</div>`));
  panel.innerHTML = items.join('');
}
function setYearFilter(v){
  ledgerState.year = v;
  const btn = document.getElementById('sv-yearBtn');
  btn.textContent = (v==='all' ? 'Year: All ▾' : v+' ▾');
  btn.classList.toggle('filtered', v!=='all');
  document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('open'));
  render();
}

function catLabel(key){
  const c = CATEGORIES.find(c=>c.key===key);
  return c ? c.chipLabel : key;
}

function render(){
  buildCatStats();
  buildMonthPanel();
  buildYearPanel();

  const q = document.getElementById('sv-searchBox').value.toLowerCase();
  let filtered = ledgerState.entries.filter(e=>{
    const matchesSource = ledgerState.sourceFilter==='all' || e.source===ledgerState.sourceFilter;
    const matchesCategory = ledgerState.categoryFilter==='all' || e.category===ledgerState.categoryFilter;
    const matchesSearch = !q || e.cardno.toLowerCase().includes(q) || (e.benefit||'').toLowerCase().includes(q) || (e.section||'').toLowerCase().includes(q);
    const d = entryDateForFilter(e);
    const matchesMonth = ledgerState.month==='all' || (d && parseInt(d.slice(5,7))-1 === ledgerState.month);
    const matchesYear = ledgerState.year==='all' || (d && parseInt(d.slice(0,4)) === ledgerState.year);
    return matchesSource && matchesCategory && matchesSearch && matchesMonth && matchesYear;
  });

  const list = document.getElementById('sv-entryList');
  if(filtered.length===0){
    list.innerHTML = `<div class="empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#5C6774" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <p>${ledgerState.entries.length===0 ? 'No entries yet — log the first one on the left.' : 'Nothing matches these filters.'}</p>
    </div>`;
  } else {
    list.innerHTML = filtered.map(e => `
      <div class="entry">
        <div class="sl">${String(e.sl).padStart(2,'0')}</div>
        <div class="body">
          <div class="top">
            <span class="tag ${e.source.toLowerCase()}">${e.source}</span>
            <span class="tag cat">${escapeHtml(catLabel(e.category))}</span>
            <span class="tag">${escapeHtml(e.section||'')}</span>
            <span class="card-no">${escapeHtml(e.cardno)}</span>
          </div>
          ${e.benefit ? `<div class="details">${escapeHtml(e.benefit)}</div>` : ''}
          <div class="meta">
            ${e.created ? `<span>Created ${e.created}</span>` : ''}
            ${e.ongoing ? `<span>Ongoing ${e.ongoing}</span>` : ''}
            ${e.complete ? `<span>Complete ${e.complete}</span>` : ''}
          </div>
        </div>
        <div class="entry-actions">
          <div class="amount">${fmtMoney(e.amount)}${e.uom ? ' '+escapeHtml(e.uom) : ''}</div>
          <button class="del" onclick="deleteEntry(${e.sl})" title="Remove">✕</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('sv-statCount').textContent = ledgerState.entries.length;
  document.getElementById('sv-statIC').textContent = ledgerState.entries.filter(e=>e.source==='IC').length;
  document.getElementById('sv-statPC').textContent = ledgerState.entries.filter(e=>e.source==='PC').length;

  const bySection = {};
  ledgerState.entries.forEach(e => bySection[e.section] = (bySection[e.section]||0) + 1);
  const top = Object.entries(bySection).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('sv-statSection').textContent = top ? top[0] : '—';
}

      project_name: project.name,
      start_date: project.start || null,
      end_date: project.end || null,
      description: project.desc || null,
      benefits: project.benefit || null,
      expected_cost_savings: project.costSavings || null,
      estimated_budget: project.budget === '' || project.budget === null || project.budget === undefined ? null : Number(project.budget),
      status: project.status || 'pending',
      milestones: project.milestones || [],
      progress: computeProgress(project),
      actual_savings: project.actualSavings === '' || project.actualSavings === null || project.actualSavings === undefined ? null : Number(project.actualSavings),
      actual_budget: project.actualBudget === '' || project.actualBudget === null || project.actualBudget === undefined ? null : Number(project.actualBudget),
      actual_details: project.actualDetails || null
    };
  }

  async function loadProjects(){
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=id.asc`, { headers: apiHeaders() });
      if(!res.ok) throw new Error('Fetch failed: ' + res.status);
      const rows = await res.json();
      projects = rows.map(fromDbRow);
    }catch(e){
      console.error(e);
      toast('Could not load projects from Supabase.');
      projects = [];
    }
  }

  async function insertProject(project){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: apiHeaders({ 'Prefer': 'return=representation' }),
      body: JSON.stringify(toDbPayload(project))
    });
    if(!res.ok){
      const text = await res.text();
      throw new Error('Insert failed: ' + res.status + ' ' + text);
    }
    const rows = await res.json();
    return fromDbRow(Array.isArray(rows) ? rows[0] : rows);
  }

  async function updateProjectDb(project){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${project.id}`, {
      method: 'PATCH',
      headers: apiHeaders({ 'Prefer': 'return=representation' }),
      body: JSON.stringify(toDbPayload(project))
    });
    if(!res.ok){
      const text = await res.text();
      throw new Error('Update failed: ' + res.status + ' ' + text);
    }
    const rows = await res.json();
    return fromDbRow(Array.isArray(rows) ? rows[0] : rows);
  }

  async function deleteProjectDb(id){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
      method: 'DELETE',
      headers: apiHeaders()
    });
    if(!res.ok) throw new Error('Delete failed: ' + res.status);
  }

  // ---------- SECTION 01 ----------
  $('registerBtn').addEventListener('click', async ()=>{
    const name = $('pName').value.trim();
    const sbu = $('pSbu').value.trim();
    const start = $('pStart').value;
    const end = $('pEnd').value;
    const desc = $('pDesc').value.trim();
    const benefit = $('pBenefit').value.trim();
    const costSavings = $('pCostSavings').value.trim();
    const budget = $('pBudget').value;
    const hint = $('registerHint');

    if(!name || !sbu){
      hint.textContent = 'Project Name and SBU Name are required.';
      hint.style.color = 'var(--bad)';
      return;
    }
    if(projects.some(p => p.name.toLowerCase() === name.toLowerCase())){
      hint.textContent = 'A project with this name is already registered.';
      hint.style.color = 'var(--bad)';
      return;
    }
    const registerBtn = $('registerBtn');
    registerBtn.disabled = true;
    registerBtn.textContent = 'Registering...';
    try{
      const inserted = await insertProject({
        name, sbu, start, end, desc, benefit, costSavings, budget,
        status: 'pending', milestones: [], progress: 0
      });
      projects.push(inserted);
      ['pName','pSbu','pStart','pEnd','pDesc','pBenefit','pCostSavings','pBudget'].forEach(id => $(id).value = '');
      hint.textContent = '';
      toast('"' + name + '" registered.');
      refreshSetupDropdowns();
      renderLedger();
    }catch(e){
      console.error(e);
      hint.textContent = 'Could not save this project. Please try again.';
      hint.style.color = 'var(--bad)';
    }finally{
      registerBtn.disabled = false;
      registerBtn.textContent = 'Register Project';
    }
  });

  // ---------- SECTION 02 ----------
  const SBU_LIST = ['ACCL','APFIL','FAL','MRML','M.OIL','AEFML','AAFL','ALEL','AIL'];

  function refreshSetupDropdowns(){
    const sbuSel = $('setupSbu');
    const currentSbu = sbuSel.value;
    sbuSel.innerHTML = '<option value="">Select SBU…</option>' +
      SBU_LIST.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    if(SBU_LIST.includes(currentSbu)) sbuSel.value = currentSbu;
    populateProjectDropdown();
  }

  function populateProjectDropdown(){
    const sbu = $('setupSbu').value;
    const projSel = $('setupProject');
    const currentProj = projSel.value;
    const list = projects.filter(p => !sbu || p.sbu === sbu);
    projSel.innerHTML = '<option value="">Select project…</option>' +
      list.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}${p.status==='finalized' ? ' (finalized)' : ''}</option>`).join('');
    if(list.some(p=>p.id === currentProj)) projSel.value = currentProj;
    else loadMilestoneEditor(null);
  }

  $('setupSbu').addEventListener('change', populateProjectDropdown);
  $('setupProject').addEventListener('change', (e)=> loadMilestoneEditor(e.target.value || null));

  function loadMilestoneEditor(projectId){
    const project = projects.find(p=>p.id === projectId);
    if(!project){
      currentMilestoneRows = [];
      renderMilestoneRows();
      $('finalizeBtn').disabled = true;
      $('finalizeHint').textContent = 'Select a project to begin milestone setup.';
      return;
    }
    currentMilestoneRows = project.milestones.length
      ? project.milestones.map(m => ({...m}))
      : [{id:uid(), name:'', weight:'', done:false}, {id:uid(), name:'', weight:'', done:false}, {id:uid(), name:'', weight:'', done:false}];
    renderMilestoneRows();
  }

  function addMilestoneRow(){
    currentMilestoneRows.push({id:uid(), name:'', weight:'', done:false});
    renderMilestoneRows();
  }
  $('addRowBtn').addEventListener('click', addMilestoneRow);

  function renderMilestoneRows(){
    const wrap = $('msRows');
    wrap.innerHTML = '';
    currentMilestoneRows.forEach(row=>{
      const el = document.createElement('div');
      el.className = 'ms-row';
      el.dataset.id = row.id;
      el.innerHTML = `
        <input type="text" class="ms-name" placeholder="Milestone name" value="${escapeHtml(row.name)}">
        <input type="number" class="ms-weight" min="0" max="100" step="0.01" placeholder="0.00" value="${row.weight === '' ? '' : row.weight}">
        <button type="button" class="toggle" data-done="${row.done}">${row.done ? 'YES' : 'NO'}</button>
        <button type="button" class="remove-row" aria-label="Remove milestone">×</button>
      `;
      el.querySelector('.ms-name').addEventListener('input', e=>{ row.name = e.target.value; updateGaugeAndHint(); });
      el.querySelector('.ms-weight').addEventListener('input', e=>{ row.weight = e.target.value; updateGaugeAndHint(); });
      const toggleBtn = el.querySelector('.toggle');
      toggleBtn.addEventListener('click', ()=>{
        row.done = !row.done;
        toggleBtn.dataset.done = row.done;
        toggleBtn.textContent = row.done ? 'YES' : 'NO';
        updateGaugeAndHint();
      });
      el.querySelector('.remove-row').addEventListener('click', ()=>{
        currentMilestoneRows = currentMilestoneRows.filter(r=>r.id !== row.id);
        renderMilestoneRows();
      });
      wrap.appendChild(el);
    });
    updateGaugeAndHint();
  }

  function currentWeightSum(){
    return currentMilestoneRows.reduce((sum,r)=> sum + (Number(r.weight) || 0), 0);
  }

  let syncDebounceTimer = null;
  function debouncedPersistMilestones(project){
    clearTimeout(syncDebounceTimer);
    syncDebounceTimer = setTimeout(async () => {
      try{ await updateProjectDb(project); }
      catch(e){ console.error(e); toast('Could not save milestones.'); }
    }, 700);
  }

  function syncMilestonesToProject(){
    const projectId = $('setupProject').value;
    const project = projects.find(p=>p.id === projectId);
    if(!project) return;
    project.milestones = currentMilestoneRows
      .filter(r => r.name.trim())
      .map(r => ({id:r.id, name:r.name.trim(), weight:Number(r.weight)||0, done:!!r.done}));
    debouncedPersistMilestones(project);
    renderLedger();
  }

  function updateGaugeAndHint(){
    syncMilestonesToProject();
    const sum = currentWeightSum();
    const gaugeValue = $('gaugeValue');
    const gaugeFill = $('gaugeFill');
    let state = 'warn';
    if(Math.abs(sum - 100) < 0.01) state = 'ok';
    else if(sum > 100) state = 'bad';
    gaugeValue.textContent = sum.toFixed(2) + '%';
    gaugeValue.className = 'gauge-value state-' + state;
    gaugeFill.className = 'gauge-fill state-' + state;
    gaugeFill.style.width = Math.min(sum,100) + '%';

    const projSelected = !!$('setupProject').value;
    const hint = $('finalizeHint');
    const finalizeBtn = $('finalizeBtn');
    if(!projSelected){
      hint.textContent = 'Select a project to begin milestone setup.';
      finalizeBtn.disabled = true;
    } else if(state !== 'ok'){
      hint.textContent = 'Total weight must equal exactly 100% to finalize.';
      finalizeBtn.disabled = true;
    } else if(currentMilestoneRows.some(r => r.weight !== '' && !r.name.trim())){
      hint.textContent = 'Every weighted row needs a milestone name.';
      finalizeBtn.disabled = true;
    } else {
      hint.textContent = 'Ready to finalize.';
      finalizeBtn.disabled = false;
    }
  }

  $('finalizeBtn').addEventListener('click', async ()=>{
    const projectId = $('setupProject').value;
    const project = projects.find(p=>p.id === projectId);
    if(!project) return;
    const cleanRows = currentMilestoneRows
      .filter(r => r.name.trim())
      .map(r => ({id:r.id, name:r.name.trim(), weight:Number(r.weight)||0, done:!!r.done}));
    project.milestones = cleanRows;
    project.status = 'finalized';
    if(computeProjectProgress(project) >= 100) expandedIds.add(project.id);
    clearTimeout(syncDebounceTimer);
    const finalizeBtn = $('finalizeBtn');
    finalizeBtn.disabled = true;
    finalizeBtn.textContent = 'Finalizing...';
    try{
      await updateProjectDb(project);
      toast('"' + project.name + '" finalized.');
      $('setupSbu').value = '';
      $('setupProject').innerHTML = '<option value="">Select project…</option>';
      loadMilestoneEditor(null);
      refreshSetupDropdowns();
      renderLedger();
    }catch(e){
      console.error(e);
      toast('Could not finalize this project. Please try again.');
    }finally{
      finalizeBtn.textContent = 'Finalize Project';
      updateGaugeAndHint();
    }
  });

  // ---------- LEDGER ----------
  let expandedIds = new Set();
  let filters = { project:'', sbu:'', status:'all', from:'', to:'' };

  $('ledgerProjectFilter').addEventListener('change', e=>{ filters.project = e.target.value; renderLedger(); });
  $('ledgerSbuFilter').addEventListener('change', e=>{ filters.sbu = e.target.value; renderLedger(); });
  $('ledgerStatusFilter').addEventListener('change', e=>{ filters.status = e.target.value; renderLedger(); });
  $('ledgerFrom').addEventListener('change', e=>{ filters.from = e.target.value; renderLedger(); });
  $('ledgerTo').addEventListener('change', e=>{ filters.to = e.target.value; renderLedger(); });
  $('ledgerClear').addEventListener('click', ()=>{
    filters = { project:'', sbu:'', status:'all', from:'', to:'' };
    $('ledgerProjectFilter').value = '';
    $('ledgerSbuFilter').value = '';
    $('ledgerStatusFilter').value = 'all';
    $('ledgerFrom').value = '';
    $('ledgerTo').value = '';
    renderLedger();
  });

  function refreshLedgerFilterDropdowns(){
    const projSel = $('ledgerProjectFilter');
    const sbuSel = $('ledgerSbuFilter');
    const keepProj = projSel.value;
    const keepSbu = sbuSel.value;
    const names = [...new Set(projects.map(p=>p.name))].sort();
    projSel.innerHTML = '<option value="">All projects</option>' +
      names.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
    sbuSel.innerHTML = '<option value="">All SBUs</option>' +
      SBU_LIST.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    if(names.includes(keepProj)) projSel.value = keepProj; else filters.project = '';
    if(SBU_LIST.includes(keepSbu)) sbuSel.value = keepSbu; else filters.sbu = '';
  }

  function computeStatus(progress){
    if(progress === null || progress <= 0) return 'pending';
    if(progress >= 100) return 'final';
    return 'initiated';
  }

  function projectMatchesFilters(p, progress){
    if(filters.project && p.name !== filters.project) return false;
    if(filters.sbu && p.sbu !== filters.sbu) return false;
    if(filters.status !== 'all' && computeStatus(progress) !== filters.status) return false;
    // date range overlap: project's [start,end] intersects the [from,to] filter window
    if(filters.from && p.end && p.end < filters.from) return false;
    if(filters.from && !p.end && p.start && p.start < filters.from) return false;
    if(filters.to && p.start && p.start > filters.to) return false;
    return true;
  }

  async function toggleMilestoneDoneFromLedger(projectId, milestoneId){
    const project = projects.find(p=>p.id === projectId);
    if(!project) return;
    const m = project.milestones.find(x=>x.id === milestoneId);
    if(!m) return;
    m.done = !m.done;
    if(computeProjectProgress(project) >= 100) expandedIds.add(projectId);
    renderLedger();

    // keep Section 02 editor in sync if this same project is currently loaded there
    if($('setupProject').value === projectId){
      const row = currentMilestoneRows.find(r=>r.id === milestoneId);
      if(row) row.done = m.done;
      renderMilestoneRows();
    }
    try{ await updateProjectDb(project); }
    catch(e){ console.error(e); toast('Could not save this change.'); }
  }

  async function saveActualsForProject(projectId){
    const project = projects.find(p=>p.id === projectId);
    if(!project) return;
    const savingsInput = document.querySelector(`.actual-savings-input[data-project="${projectId}"]`);
    const budgetInput = document.querySelector(`.actual-budget-input[data-project="${projectId}"]`);
    const detailsInput = document.querySelector(`.actual-details-input[data-project="${projectId}"]`);
    const hintEl = document.getElementById('actualsHint-'+projectId);
    const btn = document.querySelector(`.actuals-save-btn[data-project="${projectId}"]`);

    const actualSavings = savingsInput.value === '' ? null : Number(savingsInput.value);
    const actualBudget = budgetInput.value === '' ? null : Number(budgetInput.value);
    const actualDetails = detailsInput.value.trim() || null;

    btn.disabled = true;
    btn.textContent = 'Saving...';
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${projectId}`, {
        method: 'PATCH',
        headers: apiHeaders({ 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ actual_savings: actualSavings, actual_budget: actualBudget, actual_details: actualDetails })
      });
      if(!res.ok){
        const text = await res.text();
        throw new Error('Save failed: ' + res.status + ' ' + text);
      }
      project.actualSavings = actualSavings === null ? '' : actualSavings;
      project.actualBudget = actualBudget === null ? '' : actualBudget;
      project.actualDetails = actualDetails || '';
      if(hintEl){ hintEl.textContent = 'Saved.'; hintEl.style.color = 'var(--good)'; }
      toast('Actuals saved for "' + project.name + '".');
    }catch(e){
      console.error(e);
      if(hintEl){ hintEl.textContent = 'Could not save — try again.'; hintEl.style.color = 'var(--bad)'; }
      toast('Could not save actuals.');
    }finally{
      btn.disabled = false;
      btn.textContent = 'Save Actuals';
    }
  }

  function renderLedger(){
    refreshLedgerFilterDropdowns();
    const body = $('ledgerBody');
    if(projects.length === 0){
      body.innerHTML = '<div class="ledger-empty">No projects registered yet.</div>';
      return;
    }
    const withProgress = projects.map(p=>{
      const hasMilestones = p.milestones && p.milestones.length > 0;
      const progress = hasMilestones
        ? p.milestones.filter(m=>m.done).reduce((s,m)=>s+m.weight,0)
        : (p.progress ? p.progress : null);
      return {p, hasMilestones, progress};
    });
    const visible = withProgress.filter(({p, progress}) => projectMatchesFilters(p, progress));

    if(visible.length === 0){
      body.innerHTML = '<div class="ledger-empty">No projects match these filters.</div>';
      return;
    }

    const rows = visible.map(({p, hasMilestones, progress})=>{
      let fillClass = 'state-warn';
      if(progress !== null){
        fillClass = progress >= 100 ? 'state-ok' : progress >= 50 ? 'state-warn' : 'state-bad';
      }
      const dateRange = (p.start || p.end) ? `${p.start || '—'} → ${p.end || '—'}` : '—';
      const isOpen = expandedIds.has(p.id);
      let statusLabel, statusClass;
      if(progress === null || progress <= 0){
        statusLabel = 'pending'; statusClass = 'pending';
      } else if(progress >= 100){
        statusLabel = 'final'; statusClass = 'final';
      } else {
        statusLabel = 'initiated'; statusClass = 'initiated';
      }
      const mainRow = `
        <tr>
          <td>
            <button class="expand-btn" data-id="${p.id}" aria-label="Toggle details">${isOpen ? '▾' : '▸'}</button>
          </td>
          <td>${escapeHtml(p.name)}<br><span style="color:var(--muted);font-size:11.5px;">${escapeHtml(dateRange)}</span></td>
          <td>${escapeHtml(p.sbu)}</td>
          <td><span class="badge ${statusClass}">${statusLabel}</span></td>
          <td>
            ${progress === null
              ? '<span style="color:var(--muted);">—</span>'
              : `<div class="ledger-progress"><div class="mini-track"><div class="mini-fill ${fillClass}" style="width:${Math.min(progress,100)}%;background:var(--${fillClass==='state-ok'?'good':fillClass==='state-warn'?'avg':'bad'})"></div></div><span class="ledger-pct">${progress.toFixed(1)}%</span></div>`}
          </td>
          <td><button class="del-btn" data-id="${p.id}" aria-label="Delete project">🗑</button></td>
        </tr>`;
      const detailParts = [];
      if(p.desc) detailParts.push(`<strong style="color:var(--text);">Description:</strong> ${escapeHtml(p.desc)}`);
      if(p.benefit) detailParts.push(`<strong style="color:var(--text);">Benefits:</strong> ${escapeHtml(p.benefit)}`);
      if(p.costSavings) detailParts.push(`<strong style="color:var(--text);">Expected Cost Savings:</strong> ${escapeHtml(p.costSavings)}`);
      if(p.budget !== undefined && p.budget !== '' && p.budget !== null) detailParts.push(`<strong style="color:var(--text);">Estimated Budget:</strong> ${escapeHtml(p.budget)}`);
      const subRow = isOpen ? `
        <tr class="ledger-sub-row">
          <td></td>
          <td colspan="5">
            <div class="ledger-milestones">
              ${detailParts.length ? `<div class="lm-item" style="grid-template-columns:1fr;"><span class="lm-name" style="color:var(--muted);line-height:1.6;">${detailParts.join('<br>')}</span></div>` : ''}
              ${p.milestones.map(m => `
                <div class="lm-item">
                  <span class="lm-name">${escapeHtml(m.name)}</span>
                  <span class="lm-weight">${m.weight.toFixed(2)}%</span>
                  <button type="button" class="toggle lm-toggle" data-project="${p.id}" data-milestone="${m.id}" data-done="${m.done}">${m.done ? 'YES' : 'NO'}</button>
                </div>`).join('')}
            </div>
            ${progress !== null && progress >= 100 ? `
              <div class="actuals-block">
                <div class="actuals-title">Completed — Actuals</div>
                <div class="field-grid">
                  <div class="field">
                    <label>Actual Savings</label>
                    <input type="number" step="0.01" class="actual-savings-input" data-project="${p.id}" value="${p.actualSavings===''?'':p.actualSavings}" placeholder="e.g. 42000">
                  </div>
                  <div class="field">
                    <label>Actual Budget</label>
                    <input type="number" step="0.01" class="actual-budget-input" data-project="${p.id}" value="${p.actualBudget===''?'':p.actualBudget}" placeholder="e.g. 148000">
                  </div>
                  <div class="field full">
                    <label>Actual Details</label>
                    <textarea class="actual-details-input" data-project="${p.id}" placeholder="What actually happened — final figures, notes, learnings…">${escapeHtml(p.actualDetails||'')}</textarea>
                  </div>
                </div>
                <div class="btn-row">
                  <span class="hint" id="actualsHint-${p.id}"></span>
                  <button type="button" class="btn small confirm actuals-save-btn" data-project="${p.id}">Save Actuals</button>
                </div>
              </div>
            ` : ''}
          </td>
        </tr>` : '';
      return mainRow + subRow;
    }).join('');
    body.innerHTML = `
      <table class="ledger">
        <thead><tr><th></th><th>Project</th><th>SBU</th><th>Status</th><th>Progress</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    body.querySelectorAll('.expand-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.id;
        if(expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id);
        renderLedger();
      });
    });
    body.querySelectorAll('.lm-toggle').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        toggleMilestoneDoneFromLedger(btn.dataset.project, btn.dataset.milestone);
      });
    });
    body.querySelectorAll('.actuals-save-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> saveActualsForProject(btn.dataset.project));
    });
    body.querySelectorAll('.del-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.dataset.id;
        const p = projects.find(x=>x.id===id);
        if(!p) return;
        if(!confirm(`Delete "${p.name}"? This cannot be undone.`)) return;
        btn.disabled = true;
        try{
          await deleteProjectDb(id);
          projects = projects.filter(x=>x.id!==id);
          expandedIds.delete(id);
          refreshSetupDropdowns();
          renderLedger();
        }catch(e){
          console.error(e);
          toast('Could not delete this project. Please try again.');
          btn.disabled = false;
        }
      });
    });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- INIT ----------
  function computeProjectProgress(p){
    const hasMilestones = p.milestones && p.milestones.length > 0;
    return hasMilestones
      ? p.milestones.filter(m=>m.done).reduce((s,m)=>s+m.weight,0)
      : (p.progress ? p.progress : null);
  }

  (async function init(){
    await loadProjects();
    // Auto-expand already-completed projects so their Actuals section is
    // visible immediately, instead of being hidden behind the collapsed row.
    projects.forEach(p => { if(computeProjectProgress(p) >= 100) expandedIds.add(p.id); });
    refreshSetupDropdowns();
    loadMilestoneEditor(null);
    renderLedger();
  })();
})();
%%ENDSCRIPT%%>
</body>
</html>
</script>
<script type="text/plain" id="tpl-training"><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Command Center</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #12161f;
    --panel-border: #232838;
    --field-bg: #171c28;
    --field-border: #2a3040;
    --text: #e8eaef;
    --muted: #8b93a7;
    --accent: #d99a3d;
    --accent-soft: rgba(217,154,61,0.12);
    --good: #3fae62;
    --good-soft: rgba(63,174,98,0.14);
    --avg: #d9b83d;
    --avg-soft: rgba(217,184,61,0.14);
    --bad: #d9553d;
    --bad-soft: rgba(217,85,61,0.14);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);

  @media (max-width: 900px) {

  .grid {
    display: grid;

  }
  @media (max-width: 980px) {
    .grid { grid-template-columns: 1fr; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);

  }
  .panel-head {
    display: flex;
    align-items: center;

  }
  .badge-tag {
    font-size: 10.5px;

  .field {

  .filters {

  select.filter-pill {

  .cards-list {

  }
  .status-chip {
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.4px;

  }
  .status-created { background: var(--avg-soft); color: var(--avg); }
  .status-complete { background: var(--good-soft); color: var(--good); }
  .card-meta {
    color: var(--muted);
    font-size: 11.5px;
    white-space: nowrap;
  }
  .card-name {
    font-size: 14.5px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .tag-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .metric-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--panel-border);
    border-radius: 7px;
    padding: 6px 8px;
    font-size: 11px;
  }
  .metric-item .k { color: var(--muted); display: block; margin-bottom: 2px; }
  .metric-item .v { font-weight: 700; }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
    gap: 10px;
    border-top: 1px solid var(--panel-border);

  }
  .complete-controls {
    display: flex;
    align-items: center;

  }
  .complete-controls input[type="date"] {
    background: var(--panel);

    border-radius: 6px;
    padding: 6px 8px;
