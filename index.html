    font-family: inherit;
  }
  .complete-btn {
    background: var(--good);
    color: #05230f;
    border: none;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .complete-btn:hover { filter: brightness(1.1); }
  .complete-btn:disabled { opacity: 0.5; cursor: default; }
  .completed-note {
    font-size: 12px;
    color: var(--good);
    font-weight: 700;
  }
  .del-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11.5px;
    cursor: pointer;
    text-decoration: underline;
  }
  .del-link:hover { color: var(--bad); }
  .empty-state {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
  }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span> Training Command Center</div>
  <div class="top-tabs">
    <span class="active">Training Provided</span>
  </div>
</header>

<div class="page">
  <div class="eyebrow"><span class="dot"></span> TRAINING PROVIDED LOG</div>
  <h1>Training Provided — ACCL</h1>
  <div class="lede">Training numbers are assigned automatically in order (TRN-001, TRN-002, ...). Log a new training on the left; it appears instantly on the right as <strong>Created</strong>. Total man-hour training = (No of trainees × Duration in minutes) ÷ 60. Mark a training <strong>Complete</strong> once delivered, with its completion date.</div>

  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-label">Total Trainings</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Created</div>
      <div class="stat-value avg" id="statCreated">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Complete</div>
      <div class="stat-value good" id="statComplete">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Man-hours</div>
      <div class="stat-value accent" id="statManhours">0</div>
    </div>
  </div>

  <div class="grid">
    <!-- LEFT: FORM -->
    <div class="panel">
      <div class="panel-head">
        <span class="badge-tag">NEW</span>
        <span class="panel-title">Log a training</span>
      </div>
      <div class="panel-sub">Fields marked <span class="req">*</span> are required. Status starts as <strong>Created</strong>; mark it Complete from its card once delivered.</div>

      <div class="row2">
        <div class="field readonly">
          <label>Training No <span class="hint">auto-assigned</span></label>
          <input type="text" id="trainingNo" readonly>
        </div>
        <div class="field readonly">
          <label>Date <span class="hint">created date, auto</span></label>
          <input type="text" id="dateDisplay" readonly>
        </div>
      </div>

      <div class="field">
        <label>SBU <span class="req">*</span></label>
        <select id="sbuSelect">
          <option value="">Select SBU...</option>
          <option value="ACCL">ACCL</option>
          <option value="APFIL">APFIL</option>
          <option value="FAL">FAL</option>
          <option value="MRML">MRML</option>
          <option value="M.OIL">M.OIL</option>
          <option value="AEFML">AEFML</option>
          <option value="AAFL">AAFL</option>
          <option value="ALEL">ALEL</option>
          <option value="AIL">AIL</option>
        </select>
      </div>

      <div class="field">
        <label>Training Type <span class="req">*</span></label>
        <select id="trainingType">
          <option value="">Select type...</option>
          <option value="Offline">Offline</option>
          <option value="Online">Online</option>
        </select>
      </div>

      <div class="field">
        <label>Training Name <span class="req">*</span></label>
        <input type="text" id="trainingName" placeholder="e.g. Process standardization (packer bag filling process)">
      </div>

      <div class="row2">
        <div class="field">
          <label>No of Trainees <span class="req">*</span></label>
          <input type="number" id="noOfTrainees" min="0" placeholder="e.g. 19">
        </div>
        <div class="field">
          <label>Training Duration (min) <span class="req">*</span></label>
          <input type="number" id="durationMin" min="0" placeholder="e.g. 20">
        </div>
      </div>

      <div class="computed-box">
        <span class="k">Total Man-hour Training (auto-calculated)</span>
        <span id="manhourPreview">0</span>
      </div>

      <button class="submit-btn" id="submitBtn">Log Training</button>
    </div>

    <!-- RIGHT: LOGGED CARDS -->
    <div class="panel">
      <div class="panel-head">
        <span class="badge-tag log">LOG</span>
        <span class="panel-title">Logged trainings</span>
        <span class="card-meta" id="statusMsg" style="margin-left:auto;"></span>
      </div>
      <div class="panel-sub">Every logged training appears below. Use Complete + Completion Date to close it out.</div>

      <div class="filters" id="filters">
        <div class="filter-pill active" data-filter="all">All</div>
        <div class="filter-pill" data-filter="Created">Created</div>
        <div class="filter-pill" data-filter="Complete">Complete</div>
        <select id="typeFilter" class="filter-pill" style="cursor:pointer;">
          <option value="all">All Types</option>
          <option value="Offline">Offline</option>
          <option value="Online">Online</option>
        </select>
        <select id="sbuFilter" class="filter-pill" style="cursor:pointer;">
          <option value="all">All SBUs</option>
          <option value="ACCL">ACCL</option>
          <option value="APFIL">APFIL</option>
          <option value="FAL">FAL</option>
          <option value="MRML">MRML</option>
          <option value="M.OIL">M.OIL</option>
          <option value="AEFML">AEFML</option>
          <option value="AAFL">AAFL</option>
          <option value="ALEL">ALEL</option>
          <option value="AIL">AIL</option>
        </select>
      </div>

      <div class="cards-list" id="cardsList"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://vpwbcuxwxkqvauffqooj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_1zZ68nxCL0XK0gPQDG5fsg_CqWCCBEU";
const TABLE = "accl_training_provided";

let entries = [];
let activeFilter = "all";
let activeTypeFilter = "all";
let activeSbuFilter = "all";
let highestTrainingNum = 0;

function apiHeaders(extra) {
  return Object.assign({
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Content-Type": "application/json"
  }, extra || {});
}

function fromDbRow(row) {
  return {
    dbId: row.id,
    trainingNo: "TRN-" + String(row.id).padStart(3, "0"),
    sbu: row.sbu,
    type: row.training_type,
    name: row.training_name,
    trainees: row.no_of_trainees,
    duration: row.training_duration_min,
    manhours: row.total_manhour_training,
    status: row.status,
    date: row.created_at ? row.created_at.slice(0, 10) : "",
    completionDate: row.completion_date
  };
}

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  const pad = (n) => String(n).padStart(2, "0");
  return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()}`;
}

function todayISO() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

async function loadEntries() {
  const statusEl = document.getElementById("statusMsg");
  if (statusEl) statusEl.textContent = "Loading...";
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=id.asc`,
      { headers: apiHeaders() }
    );
    if (!res.ok) throw new Error("Fetch failed: " + res.status);
    const rows = await res.json();
    entries = rows.map(fromDbRow);
    highestTrainingNum = entries.reduce((max, e) => Math.max(max, e.dbId), 0);
    if (statusEl) statusEl.textContent = "";
  } catch (err) {
    console.error(err);
    if (statusEl) statusEl.textContent = "Could not load from Supabase";
    entries = [];
  }
}

async function insertEntry(entry) {
  const payload = {
    sbu: entry.sbu,
    training_type: entry.type,
    training_name: entry.name,
    no_of_trainees: Number(entry.trainees),
    training_duration_min: Number(entry.duration),
    status: "Created"
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: "POST",
    headers: apiHeaders({ "Prefer": "return=representation" }),
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error("Insert failed: " + res.status + " " + text);
  }
  return res.json();
}

async function markComplete(dbId, completionDate) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${dbId}`, {
    method: "PATCH",
    headers: apiHeaders({ "Prefer": "return=representation" }),
    body: JSON.stringify({ status: "Complete", completion_date: completionDate })
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error("Update failed: " + res.status + " " + text);
  }
  return res.json();
}

async function deleteEntry(dbId) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${dbId}`, {
    method: "DELETE",
    headers: apiHeaders()
  });
  if (!res.ok) throw new Error("Delete failed: " + res.status);
}

function nextTrainingNo() {
  return "TRN-" + String(highestTrainingNum + 1).padStart(3, "0");
}

function escapeHtml(str) {
  if (str === undefined || str === null) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function refreshFormDefaults() {
  document.getElementById("trainingNo").value = nextTrainingNo();
  document.getElementById("dateDisplay").value = fmtDate(todayISO());
}

function updateManhourPreview() {
  const trainees = Number(document.getElementById("noOfTrainees").value) || 0;
  const duration = Number(document.getElementById("durationMin").value) || 0;
  const manhours = Math.round(((trainees * duration) / 60) * 10000) / 10000;
  document.getElementById("manhourPreview").textContent = manhours;
}

function updateStats() {
  const total = entries.length;
  const created = entries.filter(e => e.status === "Created").length;
  const complete = entries.filter(e => e.status === "Complete").length;
  const manhours = entries.reduce((sum, e) => sum + (Number(e.manhours) || 0), 0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statCreated").textContent = created;
  document.getElementById("statComplete").textContent = complete;
  document.getElementById("statManhours").textContent = Math.round(manhours * 100) / 100;
}

function renderCards() {
  const list = document.getElementById("cardsList");
  const filtered = entries.filter(e => {
    if (activeTypeFilter !== "all" && e.type !== activeTypeFilter) return false;
    if (activeSbuFilter !== "all" && (e.sbu || "") !== activeSbuFilter) return false;
    if (activeFilter === "all") return true;
    return e.status === activeFilter;
  });

  updateStats();

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">No trainings in this view yet.</div>`;
    return;
  }

  list.innerHTML = filtered.slice().reverse().map(e => {
    const statusClass = e.status === "Complete" ? "status-complete" : "status-created";
    const isComplete = e.status === "Complete";
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-id-group">
            <span class="card-id">${escapeHtml(e.trainingNo)}</span>
            <span class="status-chip ${statusClass}">${escapeHtml(e.status)}</span>
          </div>
          <span class="card-meta">Logged ${escapeHtml(fmtDate(e.date))}</span>
        </div>
        <div class="card-name">${escapeHtml(e.name)}</div>
        <div class="tag-row">
          <span class="tag">${escapeHtml(e.sbu || "—")}</span>
          <span class="tag">${escapeHtml(e.type || "—")}</span>
        </div>
        <div class="metric-grid">
          <div class="metric-item"><span class="k">No of Trainees</span><span class="v">${e.trainees ?? "—"}</span></div>
          <div class="metric-item"><span class="k">Duration (min)</span><span class="v">${e.duration ?? "—"}</span></div>
          <div class="metric-item"><span class="k">Man-hour Training</span><span class="v">${e.manhours ?? "—"}</span></div>
        </div>
        <div class="card-footer">
          ${isComplete
            ? `<span class="completed-note">Completed on ${escapeHtml(fmtDate(e.completionDate))}</span>`
            : `<div class="complete-controls">
                 <input type="date" data-id="${e.dbId}" class="completion-date-input" value="${todayISO()}">
                 <button class="complete-btn" data-id="${e.dbId}">Complete</button>
               </div>`
          }
          <button class="del-link" data-id="${e.dbId}">Delete</button>
        </div>
      </div>
    `;
  }).join("");

  list.querySelectorAll(".complete-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const dbId = Number(btn.getAttribute("data-id"));
      const dateInput = list.querySelector(`.completion-date-input[data-id="${dbId}"]`);
      const completionDate = dateInput ? dateInput.value : todayISO();
      if (!completionDate) {
        alert("Please choose a completion date.");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Saving...";
      try {
        const updated = await markComplete(dbId, completionDate);
        const row = Array.isArray(updated) ? updated[0] : updated;
        const idx = entries.findIndex(e => e.dbId === dbId);
        if (idx !== -1) entries[idx] = fromDbRow(row);
        renderCards();
      } catch (err) {
        console.error(err);
        alert("Could not mark this training complete. Please try again.");
        btn.disabled = false;
        btn.textContent = "Complete";
      }
    });
  });

  list.querySelectorAll(".del-link").forEach(btn => {
    btn.addEventListener("click", async () => {
      const dbId = Number(btn.getAttribute("data-id"));
      btn.disabled = true;
      btn.textContent = "Deleting...";
      try {
        await deleteEntry(dbId);
        entries = entries.filter(e => e.dbId !== dbId);
        renderCards();
      } catch (err) {
        console.error(err);
        alert("Could not delete this entry. Please try again.");
        btn.disabled = false;
        btn.textContent = "Delete";
      }
    });
  });
}

document.querySelectorAll(".filter-pill[data-filter]").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".filter-pill[data-filter]").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    activeFilter = pill.getAttribute("data-filter");
    renderCards();
  });
});

document.getElementById("typeFilter").addEventListener("change", (e) => {
  activeTypeFilter = e.target.value;
  renderCards();
});

document.getElementById("sbuFilter").addEventListener("change", (e) => {
  activeSbuFilter = e.target.value;
  renderCards();
});

document.getElementById("noOfTrainees").addEventListener("input", updateManhourPreview);
document.getElementById("durationMin").addEventListener("input", updateManhourPreview);

document.getElementById("submitBtn").addEventListener("click", async () => {
  const sbu = document.getElementById("sbuSelect").value;
  const type = document.getElementById("trainingType").value;
  const name = document.getElementById("trainingName").value.trim();
  const trainees = document.getElementById("noOfTrainees").value;
  const duration = document.getElementById("durationMin").value;

  if (!sbu || !type || !name || trainees === "" || duration === "") {
    alert("Please fill all required fields (marked *) before logging the training.");
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Logging...";

  try {
    const inserted = await insertEntry({ sbu, type, name, trainees, duration });
    const row = Array.isArray(inserted) ? inserted[0] : inserted;
    entries.push(fromDbRow(row));
    highestTrainingNum = Math.max(highestTrainingNum, row.id);

    document.getElementById("sbuSelect").value = "";
    document.getElementById("trainingType").value = "";
    document.getElementById("trainingName").value = "";
    document.getElementById("noOfTrainees").value = "";
    document.getElementById("durationMin").value = "";
    updateManhourPreview();
    refreshFormDefaults();
    renderCards();
  } catch (err) {
    console.error(err);
    alert("Could not save this training to Supabase. Please check your connection and try again.");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Log Training";
  }
});

(async function init() {
  await loadEntries();
  refreshFormDefaults();
  updateManhourPreview();
  renderCards();
})();
%%ENDSCRIPT%%>

</body>

</script>

    tbody.appendChild(emptyRow);

  tbody.querySelectorAll('.hideRowBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      entries[Number(btn.dataset.i)].hidden = true;
      renderTable();

  });
}

const $ = id => document.getElementById(id);
const sbuEl=$('sbu'), sectionEl=$('section'), machineEl=$('machine'),
      productEl=$('product'), testEl=$('test'),
      minEl=$('minVal'), maxEl=$('maxVal'), actualEl=$('actualVal'),
      statusBox=$('statusBox'), submitBtn=$('submitBtn'), msg=$('msg'),
      logBody=$('logBody'), emptyMsg=$('emptyMsg');

const fSbu=$('fSbu'), fSection=$('fSection'), fMachine=$('fMachine'),
      fFrom=$('fFrom'), fTo=$('fTo'),
      applyFilterBtn=$('applyFilter'), resetFilterBtn=$('resetFilter');

function fillSelect(sel, options, placeholder){
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    options.map(o=>`<option value="${o}">${o}</option>`).join('');
  sel.disabled = options.length === 0;
}

function resetDownstream(from){
  const order=['section','machine','product','test'];
  const idx=order.indexOf(from);
  order.slice(idx).forEach(k=>{
    if(k!=='section') $(k).disabled = true;
    $(k).innerHTML = '<option value="">—</option>';
  });
  minEl.value=''; maxEl.value=''; actualEl.value='';
  updateStatus();
}

sbuEl.addEventListener('change', ()=>{
  const sbu = sbuEl.value;
  resetDownstream('section');
  if(!sbu){ sectionEl.disabled=true; sectionEl.innerHTML='<option value="">Select SBU first</option>'; return; }
  fillSelect(sectionEl, Object.keys(SPEC[sbu]), 'Select section');
});

sectionEl.addEventListener('change', ()=>{
  const sbu=sbuEl.value, section=sectionEl.value;
  resetDownstream('machine');
  if(!section){ machineEl.disabled=true; machineEl.innerHTML='<option value="">Select section first</option>'; return; }
  fillSelect(machineEl, Object.keys(SPEC[sbu][section]), 'Select machine');
});

machineEl.addEventListener('change', ()=>{
  const sbu=sbuEl.value, section=sectionEl.value, machine=machineEl.value;
  resetDownstream('product');
  if(!machine){ productEl.disabled=true; productEl.innerHTML='<option value="">Select machine first</option>'; return; }
  fillSelect(productEl, Object.keys(SPEC[sbu][section][machine]), 'Select product criteria');
});

productEl.addEventListener('change', ()=>{
  const sbu=sbuEl.value, section=sectionEl.value, machine=machineEl.value, product=productEl.value;
  resetDownstream('test');
  if(!product){ testEl.disabled=true; testEl.innerHTML='<option value="">Select product criteria first</option>'; return; }
  fillSelect(testEl, Object.keys(SPEC[sbu][section][machine][product]), 'Select test name');
});

testEl.addEventListener('change', ()=>{
  const sbu=sbuEl.value, section=sectionEl.value, machine=machineEl.value, product=productEl.value, test=testEl.value;
  if(!test){ minEl.value=''; maxEl.value=''; updateStatus(); return; }
  const spec = SPEC[sbu][section][machine][product][test];
  minEl.value = spec.min;
  maxEl.value = spec.max;
  updateStatus();
});

function updateStatus(){
  const min=parseFloat(minEl.value), max=parseFloat(maxEl.value), val=parseFloat(actualEl.value);
  if(isNaN(min) || isNaN(max) || isNaN(val)){
    statusBox.className='status-box status-idle';
    statusBox.textContent='—';
    return null;
  }
  const pass = val >= min && val <= max;
  statusBox.className = 'status-box ' + (pass ? 'status-pass' : 'status-fail');
  statusBox.textContent = pass ? 'Pass' : 'Fail';
  return pass;
}
actualEl.addEventListener('input', updateStatus);

function monthLabel(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleString('en-US',{month:'short'}) + '-' + String(d.getFullYear()).slice(-2);
}

function renderRow(record){
  emptyMsg.style.display='none';
  const tr = document.createElement('tr');
  const pass = record.status === 'Pass';
  tr.dataset.id = record.id;
  tr.innerHTML = `<td>${record.audit_date || '—'}</td><td>${record.section}</td><td>${record.machine_name}</td><td>${record.test_name}</td><td>${record.actual_value}</td>
    <td><span class="pill ${pass?'pass':'fail'}">${record.status}</span></td><td>${record.wss}</td>
    <td><button type="button" class="del-btn">Delete</button></td>`;
  tr.querySelector('.del-btn').addEventListener('click', async ()=>{
    tr.querySelector('.del-btn').textContent = 'Deleting…';
    const { error } = await sb.from(TABLE).delete().eq('id', record.id);
    if(error){ alert('Could not delete: ' + error.message); return; }
    tr.remove();
    if(!logBody.children.length) emptyMsg.style.display='block';
  });
  logBody.prepend(tr);
}

async function loadEntries(){
  const { data, error } = await sb.from(TABLE).select('*').order('created_at', {ascending:false}).limit(50);
  if(error){ console.error(error); return; }
  logBody.innerHTML='';
  if(!data.length){ emptyMsg.style.display='block'; return; }
  emptyMsg.style.display='none';
  data.forEach(r=>{
    const tr = document.createElement('tr');
    const pass = r.status === 'Pass';
    tr.dataset.id = r.id;
    tr.innerHTML = `<td>${r.audit_date || '—'}</td><td>${r.section}</td><td>${r.machine_name}</td><td>${r.test_name}</td><td>${r.actual_value}</td>
      <td><span class="pill ${pass?'pass':'fail'}">${r.status}</span></td><td>${r.wss}</td>
      <td><button type="button" class="del-btn">Delete</button></td>`;
    tr.querySelector('.del-btn').addEventListener('click', async ()=>{
      tr.querySelector('.del-btn').textContent = 'Deleting…';
      const { error } = await sb.from(TABLE).delete().eq('id', r.id);
      if(error){ alert('Could not delete: ' + error.message); return; }
      tr.remove();
      if(!logBody.children.length) emptyMsg.style.display='block';
    });
    logBody.appendChild(tr);
  });
}

submitBtn.addEventListener('click', async ()=>{
  const required = [sbuEl, sectionEl, machineEl, productEl, testEl];
  if(required.some(el=>!el.value) || actualEl.value===''){
    alert('Fill in SBU, section, machine, product criteria, test name and actual value first.');
    return;
  }
  const pass = updateStatus();
  const payload = {
    audit_date: $('date').value || null,
    sbu: sbuEl.value,
    section: sectionEl.value,
    machine_name: machineEl.value,
    product_criteria: productEl.value,
    shift: $('shift').value,
    test_name: testEl.value,
    min_value: parseFloat(minEl.value),
    max_value: parseFloat(maxEl.value),
    actual_value: parseFloat(actualEl.value),
    status: pass ? 'Pass' : 'Fail',
    wss: $('wss').value,
    remarks: $('remarks').value || null,
    audit_month: monthLabel($('date').value)
  };

  submitBtn.disabled = true;
  submitBtn.textContent = 'Saving…';
  const { data, error } = await sb.from(TABLE).insert(payload).select().single();
  submitBtn.disabled = false;
  submitBtn.textContent = 'Submit audit entry';

  if(error){
    alert('Could not save entry: ' + error.message);
    return;
  }

  renderRow(data);
  msg.classList.add('show');
  setTimeout(()=>msg.classList.remove('show'), 2000);

  actualEl.value='';
  $('remarks').value='';
  updateStatus();
});

loadEntries();
%%ENDSCRIPT%%>
</body>
</html>
</script>

    : `<span class="summary-cell" style="color:#c3c8d1;">—</span>`;

  const finalizeBtnLabel = r.is_finalized ? 'Finalized' : 'Finalize';

  tr.innerHTML = `
    <td>${r.start_date || '—'}</td>
    <td>${r.sbu}</td>
    <td>${r.project_name}</td>
    <td>
      <select class="status-select">
        <option value="Not Started" ${r.status==='Not Started'?'selected':''}>Not started</option>
        <option value="In Progress" ${r.status==='In Progress'?'selected':''}>In progress</option>
        <option value="Completed" ${r.status==='Completed'?'selected':''}>Completed</option>
      </select>
    </td>
    <td>${summaryCell}</td>
    <td>
      <div class="row-actions">
        <button type="button" class="fin-btn-sm btn-finalize ${r.is_finalized?'active':''}">${finalizeBtnLabel}</button>
        <button type="button" class="del-btn">Delete</button>
      </div>
    </td>`;

  // status change -> update db
  tr.querySelector('.status-select').addEventListener('change', async (e)=>{
    const newStatus = e.target.value;
    const { error } = await sb.from(TABLE).update({status:newStatus}).eq('id', r.id);
    if(error){ showMessage('Could not update status: ' + error.message, 'error'); return; }
    r.status = newStatus;
    refreshTracker();
  });

  // finalize -> reveal inline textarea to capture summary, save on blur/enter
  tr.querySelector('.fin-btn-sm').addEventListener('click', ()=>{
    if(tr.querySelector('.inline-summary-row')) return; // already open
    const box = document.createElement('tr');
    box.className = 'inline-summary-row';
    box.innerHTML = `<td colspan="6">
        <div class="summary-box show">
          <label style="font-size:11.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:6px;">
            Project summary
          </label>
          <textarea placeholder="Summarize what was done, outcome, and any follow-up...">${r.summary || ''}</textarea>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button type="button" class="save-summary-btn" style="padding:8px 16px;">Save summary & finalize</button>
            <button type="button" class="cancel-summary-btn btn-secondary" style="padding:8px 16px;">Cancel</button>
          </div>
        </div>
      </td>`;
    tr.after(box);

    box.querySelector('.cancel-summary-btn').addEventListener('click', ()=> box.remove());
    box.querySelector('.save-summary-btn').addEventListener('click', async ()=>{
      const summaryText = box.querySelector('textarea').value.trim();
      if(!summaryText){ showMessage('Write a summary before finalizing.', 'error'); return; }
      const { error } = await sb.from(TABLE).update({ is_finalized:true, summary:summaryText }).eq('id', r.id);
      if(error){ showMessage('Could not save summary: ' + error.message, 'error'); return; }
      r.is_finalized = true;
      r.summary = summaryText;
      box.remove();
      loadEntries();
    });
  });

  tr.querySelector('.del-btn').addEventListener('click', async (e)=>{
    const btn = e.currentTarget;
    if(btn.dataset.confirming !== 'yes'){
      btn.dataset.confirming = 'yes';
      btn.textContent = 'Click again to confirm';
      setTimeout(()=>{ btn.dataset.confirming=''; btn.textContent='Delete'; }, 3000);
      return;
    }
    btn.textContent = 'Deleting…';
    const { error } = await sb.from(TABLE).delete().eq('id', r.id);
    if(error){ showMessage('Could not delete: ' + error.message, 'error'); btn.textContent='Delete'; btn.dataset.confirming=''; return; }
    tr.remove();
    if(!tableBody.children.length) emptyMsg.style.display='block';
    refreshTracker();
  });

  return tr;
}

async function loadEntries(){
  let query = sb.from(TABLE).select('*').order('start_date', {ascending:false});

  if(fSbu.value) query = query.eq('sbu', fSbu.value);
  if(fStatus.value) query = query.eq('status', fStatus.value);
  if(fFrom.value) query = query.gte('start_date', fFrom.value);
  if(fTo.value) query = query.lte('start_date', fTo.value);

  const { data, error } = await query;
  if(error){ showMessage('Could not load entries: ' + error.message, 'error'); return; }

  tableBody.innerHTML = '';
  if(!data.length){ emptyMsg.style.display='block'; return; }
  emptyMsg.style.display='none';
  data.forEach(r => tableBody.appendChild(buildRow(r)));
}

addBtn.addEventListener('click', async ()=>{
  const names = [...projectNameList.querySelectorAll('.project-name-input')]
    .map(i => i.value.trim())
    .filter(v => v.length > 0);

  if(!startDateEl.value || !sbuEl.value || names.length === 0){
    showMessage('Fill in start date, SBU, and at least one project name.', 'error');
    return;
  }

  addBtn.disabled = true;
  addBtn.textContent = 'Saving…';

  try{
    const rows = names.map(name => ({
      start_date: startDateEl.value,
      sbu: sbuEl.value,
      project_name: name,
      status: 'Not Started',
      is_finalized: false
    }));

    const { data, error } = await sb.from(TABLE).insert(rows).select();

    if(error){
      showMessage('Could not save: ' + error.message, 'error');
      return;
    }

    showMessage(`${data.length} project${data.length>1?'s':''} added below.`, 'ok');

    // reset form
    projectNameList.innerHTML = '';
    addNameRow();
    sbuEl.value = '';
    startDateEl.value = '';

    await loadEntries();
    await refreshTracker();
  } catch(err){
    showMessage('Unexpected error: ' + err.message, 'error');
    console.error(err);
  } finally{
    addBtn.disabled = false;
    addBtn.textContent = 'Add project';
  }
});

applyFilterBtn.addEventListener('click', (e)=>{ e.preventDefault(); loadEntries(); });
resetFilterBtn.addEventListener('click', ()=>{
  fSbu.value=''; fStatus.value=''; fFrom.value=''; fTo.value='';
  loadEntries();
});

refreshTracker();
loadEntries();

</script>

    <script>
const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeJ2gIXm8_-a0PsBa9rJYd3ZJ5q1gcXMLyPCrBqxmiSxEWgifG2EuE_cbrYg1iTkAlog/exec';

class ProblemManager {
    constructor() {
        this.problems = [];
        this.currentFilter = 'all';
        this.currentProblemId = null;
        this.init();
    }

    async init() {
        this.setupEventListeners();
        this.setDefaultDate();
        await this.loadProblems();
        this.render();
    }

    setupEventListeners() {
        document.getElementById('problemForm').addEventListener('submit', (e) => this.handleSubmit(e));

        document.querySelectorAll('.sbu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => this.selectSBU(e));
        });

        document.querySelectorAll('.priority-btn').forEach(btn => {
            btn.addEventListener('click', (e) => this.selectPriority(e));
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => this.setFilter(e));
        });

        document.querySelectorAll('.modal-close, .btn-cancel').forEach(btn => {
            btn.addEventListener('click', (e) => this.closeModal(e));
        });

        document.getElementById('solutionModal').addEventListener('click', (e) => {
            if (e.target.id === 'solutionModal') this.closeModal(e);
        });

        document.getElementById('viewSolutionModal').addEventListener('click', (e) => {
            if (e.target.id === 'viewSolutionModal') this.closeModal(e);
        });

        document.getElementById('deleteModal').addEventListener('click', (e) => {
            if (e.target.id === 'deleteModal') this.closeModal(e);
        });

        document.getElementById('confirmDeleteBtn').addEventListener('click', () => this.confirmDelete());

        // "Add Manager Solution" modal: one button saves the solution and
        // marks it in-progress. Use the "View Solution" modal afterward to
        // mark it solved once confirmed.
        document.getElementById('saveSolutionBtn').addEventListener('click', () => this.saveSolution('in-progress'));

        // "View Solution" modal: change status (solution text already exists).
        document.getElementById('viewProgressBtn').addEventListener('click', () => this.updateStatus(this.currentProblemId, 'in-progress'));
        document.getElementById('viewSolvedBtn').addEventListener('click', () => this.updateStatus(this.currentProblemId, 'solved'));
        document.getElementById('meetingBtn').addEventListener('click', () => this.callMeeting(this.currentProblemId));
        document.getElementById('sendMailBtn').addEventListener('click', () => this.sendMail(this.currentProblemId));
    }

    setDefaultDate() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('problemDate').value = today;
    }

    selectSBU(e) {
        e.preventDefault();
        document.querySelectorAll('.sbu-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('selectedSBU').value = e.target.dataset.sbu;
    }

    selectPriority(e) {
        e.preventDefault();
        document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('selectedPriority').value = e.target.dataset.priority;
    }

    async handleSubmit(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'SUBMITTING...';

        const sbu = document.getElementById('selectedSBU').value;
        const priority = document.getElementById('selectedPriority').value;
        const name = document.getElementById('yourName').value;
        const employeeId = document.getElementById('employeeId').value;
        const date = document.getElementById('problemDate').value;
        const problem = document.getElementById('problemDesc').value;
        const suggested = document.getElementById('suggestedSolution').value;

        if (!sbu) {
            this.showError('Please select an SBU');
            submitBtn.disabled = false;
            submitBtn.textContent = 'SUBMIT TICKET';
            return;
        }

        if (!priority) {
            this.showError('Please select a priority level');
            submitBtn.disabled = false;
            submitBtn.textContent = 'SUBMIT TICKET';
            return;
        }

        const newProblem = {
            id: Date.now().toString(),
            sbu,
            name,
            employeeId,
            date,
            problem,
            suggested,
            solution: null,
            status: 'open',
            priority,
            createdAt: new Date().toISOString()
        };

        try {
            await this.sendToGoogleSheet(newProblem);

            this.problems.unshift(newProblem);
            this.resetForm();
            this.render();
            this.showSyncStatus('✓ Ticket submitted & synced to Google Sheet', 'success');
        } catch (error) {
            console.error('Error:', error);
            this.showError('Failed to save. Check console and deployment URL.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'SUBMIT TICKET';
        }
    }

    async sendToGoogleSheet(problem) {
        const payload = {
            id: problem.id,
            sbu: problem.sbu,
            name: problem.name,
            employeeId: problem.employeeId,
            date: problem.date,
            problem: problem.problem,
            suggested: problem.suggested,
            solution: problem.solution,
            status: problem.status,
            priority: problem.priority
        };

        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!result.success) {
            throw new Error(result.error || 'Unknown error');
        }
        return result;
    }

    resetForm() {
        document.getElementById('problemForm').reset();
        document.querySelectorAll('.sbu-btn, .priority-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('selectedSBU').value = '';
        document.getElementById('selectedPriority').value = '';
        document.getElementById('formError').classList.remove('show');
        this.setDefaultDate();
    }

    showError(message) {
        const errorEl = document.getElementById('formError');
        errorEl.textContent = message;
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
    }

    showSyncStatus(message, type = 'success') {
        const indicator = document.getElementById('syncStatus');
        indicator.textContent = message;
        indicator.style.background = type === 'success' ? '#10b981' : '#ef4444';
        indicator.style.display = 'block';

        if (type === 'success') {
            setTimeout(() => indicator.style.display = 'none', 3000);
        }
    }

    setFilter(e) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.closest('.filter-btn').classList.add('active');
        this.currentFilter = e.target.closest('.filter-btn').dataset.filter;
        this.render();
    }

    openSolutionModal(problemId) {
        const problem = this.problems.find(p => p.id == problemId);
        if (!problem) return;

        this.currentProblemId = problemId;

        const modal = document.getElementById('solutionModal');
        const detail = document.getElementById('modalProblemDetail');

        detail.innerHTML = `
            <div class="detail-row">
                <span class="detail-label">ID:</span>
                <span class="detail-value">${problem.id}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">SBU:</span>
                <span class="detail-value">${problem.sbu}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Priority:</span>
                <span class="detail-value"><span class="priority-badge ${problem.priority}">${problem.priority.toUpperCase()}</span></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Reporter:</span>
                <span class="detail-value">${problem.name}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email:</span>
                <span class="detail-value">${problem.employeeId}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date:</span>
                <span class="detail-value">${new Date(problem.date).toLocaleDateString()}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Problem:</span>
                <span class="detail-value">${problem.problem}</span>
            </div>
        `;

        document.getElementById('managerSolution').value = '';

        modal.classList.add('show');
    }

    // Saves the manager's solution text and sets the resulting status in one step.
    async saveSolution(status) {
        const problemId = this.currentProblemId;
        const problem = this.problems.find(p => p.id == problemId);
        if (!problem) return;

        const solution = document.getElementById('managerSolution').value.trim();

        if (!solution) {
            alert('Enter solution');
            return;
        }

        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateSolution',
                    id: String(problemId),
                    solution: solution,
                    status: status
                })
            });

            const result = await response.json();

            if (!result.success) {
                throw new Error(result.error || 'Unknown error');
            }

            problem.solution = solution;
            problem.status = status;

            this.closeModal();
            this.render();
            this.showSyncStatus(`✓ Solution saved — status: ${status}`, 'success');

        } catch (error) {
            console.error('Solution error:', error);
            alert('Solution save failed');
        }
    }

    openViewSolutionModal(problemId) {
        const problem = this.problems.find(p => p.id == problemId);

        if (!problem || !problem.solution || !problem.solution.trim()) {
            return;
        }

        this.currentProblemId = problemId;

        const modal = document.getElementById('viewSolutionModal');
        const detail = document.getElementById('viewProblemDetail');
        const solutionDiv = document.getElementById('viewSolution');

        detail.innerHTML = `
            <div class="detail-row">
                <span class="detail-label">ID:</span>
                <span class="detail-value">${problem.id}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">SBU:</span>
                <span class="detail-value">${problem.sbu}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Priority:</span>
                <span class="detail-value">
                    <span class="priority-badge ${problem.priority}">
                        ${problem.priority.toUpperCase()}
                    </span>
                </span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Reporter:</span>
                <span class="detail-value">${problem.name}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Email:</span>
                <span class="detail-value">${problem.employeeId}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Date:</span>
                <span class="detail-value">${problem.date}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Status:</span>
                <span class="detail-value">
                    <span class="status-badge ${problem.status}">
                        ${problem.status}
                    </span>
                </span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Problem:</span>
                <span class="detail-value">${problem.problem}</span>
            </div>
        `;

        solutionDiv.textContent = problem.solution;

        modal.classList.add('show');
    }

    // Changes status only (solution text is left as-is). Used from the "View Solution" modal.
    async updateStatus(problemId, status) {
        const problem = this.problems.find(p => p.id == problemId);
        if (!problem) return;

        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateSolution',
                    id: String(problemId),
                    solution: problem.solution || '',
                    status: status
                })
            });

            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || 'Unknown error');
            }

            problem.status = status;
            this.closeModal();
            this.render();
            this.showSyncStatus(`✓ Status updated: ${status}`, 'success');

        } catch (error) {
            console.error('Status update error:', error);
            alert('Status update failed');
        }
    }

    callMeeting(problemId) {
        const problem = this.problems.find(p => p.id == problemId);
        if (!problem) return;

        const email = 'sanjeed@akijshipping.com';

        // Open the tab immediately, still inside the click handler, so the
        // browser doesn't treat it as an unrequested popup.
        const meetingTab = window.open('', '_blank');

        const title = `Problem Discussion Meeting - ${problem.id}`;

        const description =
`Problem ID: ${problem.id}

SBU: ${problem.sbu}

Reporter: ${problem.name}

Email: ${problem.employeeId}

Problem:
${problem.problem}

Manager Solution:
${problem.solution || '(none yet)'}
`;

        const start = new Date();
        const end = new Date(start.getTime() + 60 * 60 * 1000); // 1 hour meeting

        const formatGoogleDate = (date) => date.toISOString().replace(/-|:|\.\d+/g, '');

        const calendarURL =
            'https://calendar.google.com/calendar/render'
            + '?action=TEMPLATE'
            + '&text=' + encodeURIComponent(title)
            + '&details=' + encodeURIComponent(description)
            + '&add=' + encodeURIComponent(email)
            + '&dates=' + formatGoogleDate(start) + '/' + formatGoogleDate(end);

        if (meetingTab) {
            // Tab opened fine — navigate it to the real Calendar URL.
            meetingTab.location.href = calendarURL;
        } else {
            // Browser blocked window.open() entirely (e.g. popups disabled) —
            // fall back to navigating the current tab so the user still gets there.
            window.location.href = calendarURL;
        }
    }

    async sendMail(problemId) {
        const problem = this.problems.find(p => p.id == problemId);
        if (!problem) return;

        if (!problem.employeeId) {
            alert('This ticket has no email on file.');
            return;
        }

        const btn = document.getElementById('sendMailBtn');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'SENDING...';

        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'sendMail',
                    id: String(problemId)
                })
            });

            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || 'Unknown error');
            }

            this.showSyncStatus(`✓ Mail sent to ${problem.employeeId}`, 'success');
        } catch (error) {
            console.error('Send mail error:', error);
            alert('Failed to send mail.');
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    openDeleteModal(problemId) {
        const problem = this.problems.find(p => p.id == problemId);
        if (!problem) return;

        const modal = document.getElementById('deleteModal');
        const detail = document.getElementById('deleteProblemDetail');

        detail.innerHTML = `
            <div class="detail-row">
                <span class="detail-label">ID:</span>
                <span class="detail-value">${problem.id}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">SBU:</span>
                <span class="detail-value">${problem.sbu}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Reporter:</span>
                <span class="detail-value">${problem.name}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email:</span>
                <span class="detail-value">${problem.employeeId}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Problem:</span>
                <span class="detail-value">${problem.problem.substring(0, 100)}${problem.problem.length > 100 ? '...' : ''}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date:</span>
                <span class="detail-value">${new Date(problem.date).toLocaleDateString()}</span>
            </div>
        `;

        this.currentProblemId = problemId;
        modal.classList.add('show');
    }

    async confirmDelete() {
        if (!this.currentProblemId) return;
        const problemId = this.currentProblemId;

        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'deleteProblem', id: String(problemId) })
            });
            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || 'Unknown error');
            }
        } catch (error) {
            // If your Apps Script doesn't yet handle a "deleteProblem" action, this row
            // will only be removed locally and will reappear after the next reload.
            console.error('Delete sync failed (add a "deleteProblem" action to your Apps Script):', error);
        }

        this.problems = this.problems.filter(p => p.id !== problemId);
        this.closeModal();
        this.render();
        this.showSyncStatus('✓ Problem hidden', 'success');
    }

    closeModal(e) {
        if (e) e.preventDefault();
        document.getElementById('solutionModal').classList.remove('show');
        document.getElementById('viewSolutionModal').classList.remove('show');
        document.getElementById('deleteModal').classList.remove('show');
    }

    getFilteredProblems() {
        if (this.currentFilter === 'all') {
            return this.problems;
        }
        return this.problems.filter(p => p.sbu === this.currentFilter);
    }

    render() {
        this.updateCounts();
        this.renderProblems();
    }

    updateCounts() {
        document.getElementById('ticketsLogged').textContent = this.problems.length;

        const sbus = ['all', 'ACCL', 'APFIL', 'AIL', 'AEL', 'ALEL', 'AAFL', 'MRML'];
        sbus.forEach(sbu => {
            const count = sbu === 'all' ? this.problems.length : this.problems.filter(p => p.sbu === sbu).length;
            const btn = document.querySelector(`[data-filter="${sbu}"]`);
            if (btn) {
                btn.querySelector('.count').textContent = count;
            }
        });
    }

    renderProblems() {
        const container = document.getElementById('problemsList');
        const filtered = this.getFilteredProblems();

        if (filtered.length === 0) {
            container.innerHTML = '<p class="empty-state">No tickets for this filter.</p>';
            return;
        }

        container.innerHTML = filtered.map(problem => `
            <div class="problem-card ${problem.status}">
                <div class="problem-header">
                    <div class="problem-meta">
                        <span class="problem-sbu">${problem.sbu}</span>
                        <span class="employee-id-badge">${problem.employeeId}</span>
                        <span class="priority-badge ${problem.priority}">${problem.priority}</span>
                        <div class="problem-title">${problem.problem.substring(0, 50)}${problem.problem.length > 50 ? '...' : ''}</div>
                        <div class="problem-meta-info">
                            <span>${problem.name}</span>
                            <span>${new Date(problem.date).toLocaleDateString()}</span>
                            <span class="status-badge ${problem.status}">${problem.status}</span>
                        </div>
                    </div>
                </div>

                <div class="problem-description">${problem.problem}</div>

                ${problem.suggested ? `
                    <div class="problem-suggested">
                        <strong>Suggested Solution:</strong> ${problem.suggested}
                    </div>
                ` : ''}

                ${problem.solution ? `
                    <div style="background: #f0fdf4; padding: 10px; border-radius: 4px; margin-bottom: 12px; border-left: 3px solid #10b981;">
                        <span class="solution-badge">✓ Solution Available</span>
                    </div>
                ` : ''}

                <div class="problem-actions">
                   ${(!problem.solution || !problem.solution.trim()) ? `
<button class="btn-small btn-add-solution"
type="button"
onclick="manager.openSolutionModal('${problem.id}')">
+ Add Solution
</button>
` : ''}
                    ${(problem.solution && problem.solution.trim()) ? `
<button class="btn-small btn-view-solution"
type="button"
onclick="manager.openViewSolutionModal('${problem.id}')">
View Solution
</button>
` : ''}
                    <button class="btn-small btn-delete-small" type="button" onclick="manager.openDeleteModal('${problem.id}')">🗑️ Delete</button>
                </div>
            </div>
        `).join('');
    }

    async loadProblems() {
        try {
            const response = await fetch(GOOGLE_APPS_SCRIPT_URL);
            const data = await response.json();
            this.problems = Array.isArray(data) ? data : [];
        } catch (error) {
            console.error('Google Sheet loading failed:', error);
            this.showSyncStatus('⚠ Could not load data from Google Sheet', 'error');
            this.problems = [];
        }
    }
}

const manager = new ProblemManager();

</body>
</html>
</script>

  <script>
    const iframe = document.getElementById('viewer');
    const buttons = document.querySelectorAll('.navbtn');

    function loadTab(key) {
      const tpl = document.getElementById('tpl-' + key);
      const restored = tpl.textContent.split('%%ENDSCRIPT%%').join('</script');
      iframe.srcdoc = restored;
      buttons.forEach(b => b.classList.toggle('active', b.dataset.target === key));
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => loadTab(btn.dataset.target));
    });

    loadTab('5s');
  </script>
